<svg xmlns="http://www.w3.org/2000/svg" width="340" height="74" viewBox="0 0 340 74" role="img" aria-labelledby="title desc">
  <title id="title">Request New Library</title>
  <desc id="desc">Library is missing</desc>
  <style>
    .surface { fill: none; stroke: #cfd6dd; stroke-width: 1; }
    .icon-bg { fill: none; }
    .title { fill: #17202a; font: 700 17px Arial, Helvetica, sans-serif; }
    .caption { fill: #5d6b7a; font: 400 11.5px Arial, Helvetica, sans-serif; }
    @media (prefers-color-scheme: dark) {
      .surface { fill: none; stroke: #3b4858; }
      .icon-bg { fill: none; }
      .title { fill: #f7fafc; }
      .caption { fill: #b9c4d1; }
    }
  </style>
  <rect class="surface" x="1" y="1" width="338" height="72" rx="12"/>
  <rect class="icon-bg" x="18" y="18" width="38" height="38" rx="9"/>

  <!-- High-quality New Library Icon -->
  <image href="data:image/png;base64," x="15" y="12" width="45" height="50" />

  <text class="title" x="68" y="32">Request New Library</text>
  <text class="caption" x="68" y="51">Library is missing</text>
</svg>
