grund_config_version = 1
project_name = "forge"

[reference]
marker = "§"
trigger = "$$"
strict = true
require_grounding = false
inline_style = "citation-with-note" # citation-with-note | citation-only
inline_note_suggested_lines = 1
inline_note_max_lines = 3
inline_note_max_columns = 100
warn_on_suggested = false

[id]
format = "{kind}-{slug}" # placeholders: {kind} required; use {number}, {slug}, or both
section_separator = "."
section_heading_levels = "strict" # strict | warn | loose
number_pattern = "\\d+"
slug_pattern = "[a-z0-9][a-z0-9-]*"

[[kinds]]
prefix = "GRUND"
file = "docs/grund.md"
title = "Why: Forge motivation"

[[kinds]]
prefix = "GOAL"
file = "docs/goals.md"
title = "Where: Forge direction and outcomes"

[[kinds]]
prefix = "AR"
folder = "docs"
title = "Forge architecture and technical structure"

[[kinds]]
prefix = "FS"
folder = "docs"
title = "Forge functional behavior and requirements"

[[kinds]]
prefix = "DW"
folder = "docs"
title = "Forge do-work loop architecture"

[[kinds]]
prefix = "STRAT"
folder = "docs"
title = "Forge strategy configuration architecture"

[[kinds]]
prefix = "ORCH"
folder = "docs"
title = "Forge orchestration scripts behavior and architecture"

[[kinds]]
prefix = "GIT"
folder = "docs"
title = "Forge git scripts publication behavior and architecture"

[[kinds]]
prefix = "WF"
folder = "docs/workflows"
title = "Forge workflow specifications and operating rules"

[[kinds]]
prefix = "E2E"
folder = "docs"
title = "Forge end-to-end test specifications"

[[kinds]]
prefix = "BENCH"
folder = "docs"
title = "Forge benchmark specifications"

[[kinds]]
prefix = "ROADMAP"
folder = "docs"
title = "Forge implementation roadmap"

[scan]
include = ["AGENTS.md", "README.md", "DEVELOPING.md", "docs"]
exclude = ["target", "node_modules", ".git", "dist", "build", ".venv", ".gradle", "out", ".venv", "**/__pycache__", "local_repositories"]
extensions = ["md", "html"]
comment_prefixes = ["//", "#", "/*", "*", "<!--"]
docstring_python = false
respect_gitignore = true

[output]
format = "text" # text | json
color = "auto" # auto | always | never
relative_paths = true

[fmt.cross_refs]
enabled = false
anchor_format = "github" # github | gitlab | mkdocs | pandoc | none
