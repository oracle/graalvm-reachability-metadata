investigate-system-problem:
  instructions: |
    You are investigating whether a grouped human-intervention cause points to a
    current system problem in this repository.

    Repository: {repo}
    Source queue: {source}
    Group file: {group_file}
    Findings path: {findings_path}
    Issue body path, only when needed: {issue_body_path}

    Read the group file first. Its YAML frontmatter contains
    `problematic_items` and `common_problems`; treat those as the structured
    handoff from the scanner. Its Markdown body contains the common-cause
    hypothesis and supporting evidence.

    Your job is not to open an issue for every group. Your job is to decide
    whether the current checkout still contains a system cause that could
    produce the grouped regressions.

    Search the current codebase before deciding. Focus on:
    - `forge/` workflow drivers, orchestration code, strategies, and utility scripts
    - `forge/prompt_templates/`
    - `skills/` review and closeout instructions
    - `.github/workflows/` and reusable actions when the group is CI-related
    - repository docs/specs when they define automation behavior

    A group is not enough evidence by itself. Open no issue unless you can cite
    current files or current prompt text that plausibly cause the grouped
    problem.

    Treat the group as not issue-worthy when:
    - the current codebase already fixes or prohibits the behavior
    - the evidence comes from stale PRs generated before the fix
    - it is a one-off bad PR or reviewer finding
    - it is library-specific rather than a system problem
    - the group has no common current system cause after codebase search

    Write {findings_path} with this exact decision line near the top:

        Decision: open-issue

    or one of:

        Decision: no-system-issue
        Decision: stale
        Decision: already-fixed
        Decision: one-off
        Decision: library-specific

    The findings must include:
    - group title
    - affected items
    - observed problems from the group file
    - files and code/prompts inspected
    - current system evidence found, or why none was found
    - stale/fixed analysis
    - final decision

    If and only if the decision is `open-issue`, also write {issue_body_path}.
    That issue body must include:
    - title-ready system problem summary
    - affected source items
    - current file evidence with paths
    - why the issue is not stale
    - proposed fix
    - verification idea
    - note that it was generated by the human-intervention-scanner Rhei template

    Do not create GitHub issues, comments, labels, branches, commits, or PRs in
    this investigation state.
