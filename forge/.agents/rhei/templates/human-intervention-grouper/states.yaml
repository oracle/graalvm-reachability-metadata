# State machine diagram
# ---------------------
#
#   scanner:
#
#     sleep [initial, program, visits={{max_scans}}]
#       | exit 75 and visitCount < visits
#       v
#     scan [agent] -- appends opener tasks for new groups --> sleep
#       ^
#       |
#       +-- sleep exits 0 when the queue is drained
#       +-- sleep exits 75 and visitCount >= visits when the scan cap is reached
#
#   generated opener task:
#
#     pending [program: true, concurrent] --> executing [agent, concurrent] --> completed
#
#   Any non-final state can transition to cancelled.

name: human-intervention-grouper
version: 1.0.0

states:
  sleep:
    description: Sleep with incremental backoff, then decide whether more unscanned human-intervention items remain.
    initial: true
    visits: {{max_scans}}
    program: |
      set -eu

      unit_seconds() {
        duration="$1"
        number="${duration%[smh]}"
        unit="${duration##*[0-9]}"
        case "$unit" in
          s) printf '%s\n' "$number" ;;
          m) printf '%s\n' "$((number * 60))" ;;
          h) printf '%s\n' "$((number * 3600))" ;;
          *) printf '0\n' ;;
        esac
      }

      base="$(unit_seconds "{{base_sleep}}")"
      increment="$(unit_seconds "{{sleep_increment}}")"
      delay="$((base + ({visit_count} - 1) * increment))"
      if [ "$delay" -gt 0 ]; then
        sleep "$delay"
      fi

      mkdir -p runtime/scan
      touch runtime/scan/seen.txt

      seen_count="$(wc -l < runtime/scan/seen.txt 2>/dev/null | tr -d '[:space:]')"
      fetch_limit="$(( ${seen_count:-0} + {{scan_limit}} ))"
      if [ "$fetch_limit" -lt "{{scan_limit}}" ]; then
        fetch_limit="{{scan_limit}}"
      fi

      if [ "{{source}}" = "prs" ]; then
        if ! candidates="$(gh pr list \
          --repo "{{repo}}" \
          --state open \
          --label "human-intervention" \
          --limit "$fetch_limit" \
          --json number \
          --jq '.[].number' 2>/dev/null)"; then
          exit 75
        fi
      else
        if ! candidates="$(gh issue list \
          --repo "{{repo}}" \
          --state open \
          --label "human-intervention" \
          --limit "$fetch_limit" \
          --json number \
          --jq '.[].number' 2>/dev/null)"; then
          exit 75
        fi
      fi

      unscanned=0
      for number in $candidates; do
        if grep -qx "$number" runtime/scan/seen.txt; then
          continue
        fi
        unscanned="$((unscanned + 1))"
        if [ "$unscanned" -ge 1 ]; then
          break
        fi
      done

      if [ "$unscanned" -gt 0 ]; then
        exit 75
      fi

      exit 0
    program_timeout: 999h

  scan:
    description: Fetch a bounded human-intervention queue, group new items by root cause, deduplicate existing trackers, and append opener tasks.
    visits: {{max_scans}}
    target: "{{scanner_agent}}"
    instructions: |
      Scan Task {task_id}: {task_title}.

      You are on scan pass {visit_count} of {visits}. Work from the Rhei
      workspace root. Use GitHub as the source of truth for `{{repo}}`.

      Scan configuration:
      - source: `{{source}}`
      - queue label: `human-intervention`
      - scan limit: `{{scan_limit}}`
      - tracking issue labels: `{{issue_labels}}`

      Read `runtime/scan/seen.txt` if it exists. Fetch at most `{{scan_limit}}`
      open, not-yet-seen items carrying `human-intervention`.

      For `source: prs`, use `gh pr list` against `{{repo}}`. Include, for each
      fetched PR:
      - number, title, URL, author, assignees, labels, created/updated times
      - body, recent comments, review comments, review decision, and CI state
      - head branch, changed files, diff summary, and any Forge
        human-intervention comment or log reference

      Seed grouping hints for PRs:
      - `dynamic-access-coverage-drop`: dynamic-access percentage dropped
        across many coordinates
      - `tests-skip-native-image`: tests skipped or excluded on native-image,
        run, or other system phases
      - `missing-metadata-entry`: reflection, resource, JNI, serialization, or
        proxy metadata gaps
      - `ci-infra-flake`: runner, build, or system failures unrelated to the
        coordinate

      For `source: issues`, use `gh issue list` against `{{repo}}`. Include,
      for each fetched issue:
      - number, title, URL, author, assignees, labels, created/updated times
      - body, recent comments, linked PRs when available
      - any Forge human-intervention comment, log URL, branch, or artifact

      Seed grouping hints for issues:
      - `javac-compile-fail`: generation never compiled the reachability test
        sources
      - `java-run-fail`: the JVM run of the metadata test failed
      - `native-image-run-fail`: the native-image build or run failed
      - `library-update-stalled`: `Update existing library` needs manual
        follow-up

      Group items into concrete root-cause clusters. You may coin a new
      lowercase slug when no seed hint fits, but do not use a generic `misc`
      group. Every group must record:
      - slug
      - shared symptom, or failing phase plus error signature for issues
      - contributing item numbers and URLs
      - evidence gathered
      - why these items belong together

      Write the raw fetched item inventory to `{output.inventory.path}`.
      Update `{output.groups.path}` with this pass's groups and dedup
      decisions. Update `{output.seen.path}` with every fetched item number,
      one number per line, only after it has been recorded in the inventory and
      grouping decision.

      Deduplicate before appending opener tasks. For each group, search open
      issues in `{{repo}}` for an existing tracking issue for the same source,
      slug, root-cause symptom, or item set. If one exists, do not append an
      opener task. Comment any newly contributing items onto that issue and
      record the existing issue URL in `{output.groups.path}`.

      For every new group, append one independent root task to a task file
      under `tasks/`. Use the group slug as the task id. If that task id
      already exists, treat the group as already queued, record that decision in
      `{output.groups.path}`, and do not append a duplicate opener task.
      Use this exact shape:

          ### Task <group-slug>: Open tracking issue for <group title>
          **State:** pending

          - Source issue: https://github.com/oracle/graalvm-reachability-metadata/issues/8385
          - Repository: `{{repo}}`
          - Source queue: `{{source}}`
          - Queue label: `human-intervention`
          - Tracking issue labels: `{{issue_labels}}`
          - Group slug: `<group-slug>`
          - Shared symptom: `<short symptom>`
          - Items: `<numbers and URLs>`
          - Evidence: `<short evidence summary>`
          - Inventory: `{output.inventory.path}`
          - Groups: `{output.groups.path}`
          - Output artifact: `runtime/openers/<group-slug>.md`

      The generated opener tasks are independent root graphs. Do not add a
      `**Prior:**` edge to the scanner; they should run concurrently once
      appended.

      After writing the inventory, groups, seen file, and any opener tasks,
      transition back to `sleep`.
    outputs:
      - name: inventory
        path: runtime/scan/{visit_count}-inventory.md
        description: Raw fetched item inventory for this scan pass.
      - name: groups
        path: runtime/scan/groups.md
        description: Root-cause groups and dedup decisions across scan passes.
      - name: seen
        path: runtime/scan/seen.txt
        description: Item numbers already scanned, one per line.

  pending:
    description: Generated tracking issue opener task is queued.
    concurrent: true
    program: "true"

  executing:
    description: Open or update one GitHub tracking issue for a generated root-cause group.
    target: "{{opener_agent}}"
    concurrent: true
    instructions: |
      Execute opener Task {task_id}: {task_title}.

      Read the task body and the referenced inventory and groups artifacts.
      Open exactly one GitHub issue in `{{repo}}` for the named root-cause
      group unless the groups artifact says an existing issue was already found.

      The issue body must include:
      - group slug
      - source queue (`{{source}}`)
      - shared symptom or failing phase plus error signature
      - every contributing item number and URL
      - evidence explaining why the items belong together
      - a note that this tracker was generated by the
        `human-intervention-grouper` Rhei template

      Apply every comma-separated label in `{{issue_labels}}` to a newly
      created issue. Do not add, remove, or change labels on the source
      `{{source}}` items. Do not fix, route, close, merge, or otherwise mutate
      the source items.

      If an existing tracking issue is named in the groups artifact or found
      during a final duplicate check, do not create a duplicate. Instead,
      comment any newly contributing items onto that issue.

      Write `{output.opener.path}` with:
      - group slug
      - created issue URL, or existing issue URL if deduplicated
      - items linked
      - labels applied
      - commands run and results
      - remaining risk or human follow-up

      Transition to `completed` after the artifact is written.
    outputs:
      - name: opener
        path: runtime/openers/{task_id}.md
        description: Per-group tracking issue result.

  completed:
    description: Work is complete.
    final: true

  cancelled:
    description: Work was cancelled.
    final: true

transitions:
  - from: sleep
    to: scan
    exit_code: 75
    condition: visitCount < visits
    description: Backoff elapsed and at least one unscanned human-intervention item remains.

  - from: sleep
    to: completed
    exit_code: 0
    description: The selected queue has no unscanned human-intervention items.

  - from: sleep
    to: completed
    exit_code: 75
    condition: visitCount >= visits
    description: The scanner reached the configured scan cap.

  - from: scan
    to: sleep
    description: Scan artifacts and opener tasks were written.

  - from: pending
    to: executing
    description: Generated opener task was picked up and enters actual execution.

  - from: executing
    to: completed
    description: Tracking issue was opened or deduplicated and the opener artifact was written.

  - from: "*"
    to: cancelled
    description: Cancel any non-final task.
