# Composite action: restores or builds the shared Native Image JDK-module layer
# used by layered TCK test runs.
# §CI-setup-native-image-base-layer
name: "Setup Native Image base layer"
description: "Restores a cached JDK-module Native Image layer, or builds one for the exact installed toolchain and native-image mode."

inputs:
  base-layer-root:
    description: "Directory where the base layer cache is restored and built."
    required: false
    default: "~/.cache/graalvm-reachability-metadata/base-layers"

outputs:
  base-layer-dir:
    description: "Concrete directory containing base-layer.nil and manifest.json."
    value: ${{ steps.cache-key.outputs.base-layer-dir }}
  cache-hit:
    description: "Whether actions/cache restored an exact base-layer cache."
    value: ${{ steps.restore-cache.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    - id: cache-key
      name: "Compute base-layer cache key"
      shell: bash
      run: |
        set -euo pipefail
        base_root="${{ inputs.base-layer-root }}"
        base_root="${base_root/#\~/$HOME}"
        mode="${GVM_TCK_NATIVE_IMAGE_MODE:-current-defaults}"
        mkdir -p "$RUNNER_TEMP/native-base-layer-key"
        native-image --version > "$RUNNER_TEMP/native-base-layer-key/native-image-version.txt" 2>&1
        {
          printf '%s\n' "${{ runner.os }}"
          printf '%s\n' "${{ runner.arch }}"
          printf '%s\n' "$mode"
          cat "$RUNNER_TEMP/native-base-layer-key/native-image-version.txt"
          sha256sum ci.json
          find tests/tck-build-logic/src/main -type f -print0 | sort -z | xargs -0 sha256sum
        } > "$RUNNER_TEMP/native-base-layer-key/cache-input.txt"
        key_hash="$(sha256sum "$RUNNER_TEMP/native-base-layer-key/cache-input.txt" | cut -d' ' -f1)"
        key="native-base-layer-${{ runner.os }}-${{ runner.arch }}-${mode}-${key_hash}"
        base_layer_dir="$base_root/$key"
        echo "cache-key=$key" >> "$GITHUB_OUTPUT"
        echo "base-layer-dir=$base_layer_dir" >> "$GITHUB_OUTPUT"
        echo "GVM_TCK_BASE_LAYER_DIR=$base_layer_dir" >> "$GITHUB_ENV"

    - id: restore-cache
      name: "Restore base-layer cache"
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ${{ steps.cache-key.outputs.base-layer-dir }}
        key: ${{ steps.cache-key.outputs.cache-key }}

    - name: "Build or validate base layer"
      shell: bash
      run: |
        set -euo pipefail
        ./gradlew buildBaseLayer -Ptck.baseLayerDir="${{ steps.cache-key.outputs.base-layer-dir }}" --stacktrace
