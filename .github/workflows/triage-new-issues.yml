name: "Triage new issues"

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  verify-new-issue:
    name: "🔎 Verify new issue"
    if: ${{ github.event.issue.pull_request == null && contains(github.event.issue.labels.*.name, 'library-new-request')}}
    runs-on: ubuntu-latest
    outputs:
      coords: ${{ steps.extract.outputs.coords }}
      should_expand: ${{ steps.expand.outputs.should_expand }}

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: "Extract Maven coordinates"
        id: extract
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          set -Eeuo pipefail
          # Normalize CRLF and capture the first non-empty line that follows the "Full Maven coordinates" header
          COORDS="$(printf '%s\n' "$ISSUE_BODY" | tr -d '\r' | awk '
            f { if ($0 ~ /^[[:space:]]*$/) next; print; exit }
            /^###[[:space:]]+Full Maven coordinates[[:space:]]*$/ { f=1 }
          ')"
          COORDS="$(echo "$COORDS" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          echo "coords=$COORDS" >> "$GITHUB_OUTPUT"

      - name: "Validate coordinates format"
        id: validate
        run: |
          set -Eeuo pipefail
          COORDS="${{ steps.extract.outputs.coords }}"
          if [[ "$COORDS" =~ ^[^[:space:]:]+:[^[:space:]:]+:[^[:space:]:]+$ ]]; then
            echo "invalid=false" >> "$GITHUB_OUTPUT"
          else
            echo "Invalid coordinates format: $COORDS"
            echo "invalid=true" >> "$GITHUB_OUTPUT"
          fi

      - name: "Close issue - invalid coordinates format"
        if: ${{ steps.validate.outputs.invalid == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const coords = "${{ steps.extract.outputs.coords }}";
            const reason = `Full Maven coordinates format is invalid: '${coords}'.`;
            const body = [
              "Automated triage: " + reason,
              "",
              "Expected format:",
              "",
              "```",
              "groupId:artifactId:version",
              "```",
              "",
              "Example:",
              "",
              "```",
              "org.hibernate.orm:hibernate-core:1.2.3",
              "```",
              "",
              "This issue will be closed. Please open a new issue with the correct format under the '### Full Maven coordinates' section.",
              "Reopening will not re-run automation; maintainers will review manually."
            ].join("\n");
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
            await github.rest.issues.update({ owner, repo, issue_number, state: "closed" });

      - name: "Close issue - duplicate request for exact coordinates"
        if: ${{ steps.validate.outputs.invalid != 'true' }}
        id: duplicate
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const coords = "${{ steps.extract.outputs.coords }}";
            const exactTitle = `Support for ${coords}`;

            function extractCoordinatesFromBody(body) {
              const lines = (body || "").replace(/\r/g, "").split("\n");
              let foundHeader = false;
              for (const line of lines) {
                if (foundHeader) {
                  if (line.trim() === "") {
                    continue;
                  }
                  return line.trim();
                }
                if (/^###[ \t]+Full Maven coordinates[ \t]*$/.test(line)) {
                  foundHeader = true;
                }
              }
              return null;
            }

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100
            });

            const duplicateIssue = openIssues.find((issue) => {
              if (issue.pull_request || issue.number === issue_number) {
                return false;
              }
              return issue.title === exactTitle || extractCoordinatesFromBody(issue.body) === coords;
            });

            if (!duplicateIssue) {
              core.setOutput("duplicate", "false");
              return;
            }

            core.setOutput("duplicate", "true");
            core.setOutput("duplicate_issue_number", String(duplicateIssue.number));

            const body = [
              `Automated triage: A request for the exact coordinates (${coords}) already exists in #${duplicateIssue.number}.`,
              "",
              "Closing this issue as a duplicate.",
              "If you have additional context, please add it to the existing issue.",
              "Note: Reopening will not re-run automation; maintainers will review manually."
            ].join("\n");

            await github.rest.issues.createComment({ owner, repo, issue_number, body });
            await github.rest.issues.update({ owner, repo, issue_number, state: "closed" });

      - name: "Check if library/version is already supported by the repository"
        if: ${{ steps.validate.outputs.invalid != 'true' && steps.duplicate.outputs.duplicate != 'true' }}
        id: support
        run: |
          set -Eeuo pipefail
          COORDS="${{ steps.extract.outputs.coords }}"
          echo "Checking support for $COORDS"
          set +e
          OUTPUT="$(./check-library-support.sh "$COORDS" 2>&1)"
          STATUS=$?
          set -e
          echo "$OUTPUT"
          if grep -qF "is supported" <<<"$OUTPUT"; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
          fi
          echo "exit_code=$STATUS" >> "$GITHUB_OUTPUT"

      - name: "Close issue - already supported by the Reachability Metadata Repository"
        if: ${{ steps.support.outputs.supported == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const coords = "${{ steps.extract.outputs.coords }}";
            const body = [
              `Automated triage: The requested library (${coords}) is already supported by the GraalVM Reachability Metadata repository.`,
              "",
              "Closing this issue. If you believe this is not correct, please reopen the issue with additional details.",
              "Note: Reopening will not re-run automation; maintainers will review manually."
            ].join("\n");
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
            await github.rest.issues.update({ owner, repo, issue_number, state: "closed" });

      - name: "Derive group:artifact"
        if: ${{ steps.validate.outputs.invalid != 'true' && steps.duplicate.outputs.duplicate != 'true' && steps.support.outputs.supported != 'true' }}
        id: derive
        run: |
          set -Eeuo pipefail
          IFS=':' read -r G A V <<< "${{ steps.extract.outputs.coords }}"
          GA="$G:$A"
          echo "ga=$GA" >> "$GITHUB_OUTPUT"

      - name: "Check if listed in library-and-framework-list.json"
        if: ${{ steps.validate.outputs.invalid != 'true' && steps.duplicate.outputs.duplicate != 'true' && steps.support.outputs.supported != 'true' }}
        id: listed
        run: |
          set -Eeuo pipefail
          GA="${{ steps.derive.outputs.ga }}"
          if jq -e --arg ga "$GA" 'map(.artifact == $ga) | any' metadata/library-and-framework-list.json >/dev/null; then
            echo "listed=true" >> "$GITHUB_OUTPUT"
          else
            echo "listed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "Close issue - library listed as supported in library-and-framework-list.json"
        if: ${{ steps.listed.outputs.listed == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const coords = "${{ steps.extract.outputs.coords }}";
            const ga = "${{ steps.derive.outputs.ga }}";
            const body = [
              `Automated triage: The library (${ga}) is listed as supported in metadata/library-and-framework-list.json.`,
              "",
              "Closing this issue. If you believe this is not correct for the requested coordinates (" + coords + "), please reopen with additional context.",
              "Note: Reopening will not re-run automation; maintainers will review manually."
            ].join("\n");
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
            await github.rest.issues.update({ owner, repo, issue_number, state: "closed" });

      - name: "Mark issue eligible for dependency graph expansion"
        if: ${{ steps.validate.outputs.invalid != 'true' && steps.duplicate.outputs.duplicate != 'true' && steps.support.outputs.supported != 'true' && steps.listed.outputs.listed != 'true' }}
        id: expand
        run: |
          set -Eeuo pipefail
          echo "should_expand=true" >> "$GITHUB_OUTPUT"

  triage-transitive-dependency-issues:
    needs: verify-new-issue
    name: "✏️ Create issues for unsupported transitive dependencies"
    if: ${{ needs.verify-new-issue.result == 'success' && needs.verify-new-issue.outputs.should_expand == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: "Setup Java (GraalVM) to run Gradle"
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'graalvm'
          java-version: '21'

      - name: "Run deps.dev graph and capture raw dependency graph"
        env:
          COORDS: ${{ needs.verify-new-issue.outputs.coords }}
        run: |
          set -Eeuo pipefail
          DEPS_GRAPH_JSON="$(./gradlew -q generateDependencyGraph -Pcoordinates="$COORDS" --console=plain --no-daemon | tail -n 1)"
          jq -e . >/dev/null <<<"$DEPS_GRAPH_JSON"
          {
            echo 'DEPS_GRAPH_JSON<<EOF'
            echo "$DEPS_GRAPH_JSON"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: "Open dependency issues and link blockers"
        uses: actions/github-script@v7
        with:
          script: |
            const path = require('path');
            const scriptPath = path.join(
              process.env.GITHUB_WORKSPACE,
              '.github',
              'workflows',
              'scripts',
              'open-dependency-issues-and-link-blockers.js'
            );
            const openDependencyIssuesAndLinkBlockers = require(scriptPath);
            await openDependencyIssuesAndLinkBlockers({ github, context });
