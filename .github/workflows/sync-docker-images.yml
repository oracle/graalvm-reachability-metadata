# On Dependabot updates to allowed-docker-images, synchronizes image tags and back-commits them
# into the PR to make it merge-ready. §CI-sync-docker-images; supports the docker gate of
# §FS-repository-functional-spec.5.3.
name: "Sync Docker Image Tags"

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'tests/tck-build-logic/src/main/resources/allowed-docker-images/**'

permissions:
  contents: write

jobs:
  update-images:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: "📝 Sync docker image tags"
        run: |
          set -euo pipefail

          # get old FROM lines from master branch in Dockerfiles inside allowed directory
          OLD_LINES=$(git grep '^FROM ' origin/master -- tests/tck-build-logic/src/main/resources/allowed-docker-images | sed 's/.*:FROM //')
          
          # get new FROM lines from PR branch
          NEW_LINES=$(git grep '^FROM ' HEAD -- tests/tck-build-logic/src/main/resources/allowed-docker-images | sed 's/.*:FROM //')

          escape_sed_pattern() {
            printf '%s' "$1" | sed 's/[][\\.^$*|]/\\&/g'
          }

          escape_sed_replacement() {
            printf '%s' "$1" | sed 's/[|&\\/]/\\&/g'
          }

          # replace all occurrences across repo
          paste <(echo "$OLD_LINES") <(echo "$NEW_LINES") | while IFS=$'\t' read -r OLD NEW; do
            if [[ -n "$OLD" && -n "$NEW" && "$OLD" != "$NEW" ]]; then
              echo "Replacing $OLD → $NEW"
              grep -rlZF -- "$OLD" . | xargs -0r sed -i "s|$(escape_sed_pattern "$OLD")|$(escape_sed_replacement "$NEW")|g" || true
            fi
          done

          # commit and push changes
          git config --local user.name "github-actions"
          git config --local user.email "github-actions@github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Sync Docker image tags across repo"
            git push origin "${GITHUB_HEAD_REF}"
          else
            echo "No changes to commit"
          fi
