# Weekly Sunday metadata sweep: 85 batches from generateMatrixBatchedCoordinates
# (§TCK-test-harness.7) run tests, upload failure artifacts, and fail affected batches.
# §CI-test-all-metadata; §FS-repository-functional-spec.5.3.
name: "Test all metadata (one version per test suite)"

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "workflow = ${{ github.workflow }}, ref = ${{ github.event.ref }}, pr = ${{ github.event.pull_request.id }}"
  cancel-in-progress: true

jobs:
  get-all-metadata:
    if: github.repository == 'oracle/graalvm-reachability-metadata'
    name: "📋 Get list of all supported libraries"
    runs-on: "ubuntu-22.04"
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: "🔧 Setup java"
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'graalvm'
          java-version: '21'

      - name: "🕸️ Populate matrix"
        id: set-matrix
        run: |
          ./gradlew generateMatrixBatchedCoordinates -Pbatches=85

  test-all-metadata:
    name: "🧪 ${{ matrix.coordinates }} [${{ matrix.nativeImageMode }}] (GraalVM for JDK ${{ matrix.version }} @ ${{ matrix.os }})"
    if: github.repository == 'oracle/graalvm-reachability-metadata'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 480
    needs: get-all-metadata
    permissions:
      contents: read
    env:
      GVM_TCK_NATIVE_IMAGE_MODE: ${{ matrix.nativeImageMode }}
      LOG_LINES: "300"
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.get-all-metadata.outputs.matrix) }}
    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: "🛠️ Setup latest native-build-tools snapshot"
        uses: ./.github/actions/setup-native-build-tools

      - name: "🔧 Setup java"
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'graalvm'
          java-version: '21'

      - name: "🔧 Download GraalVM for metadata testing"
        uses: graalvm/setup-graalvm@60c26726de13f8b90771df4bc1641a52a3159994 # v1
        with:
          distribution: 'graalvm'
          java-version: ${{ matrix.version }}
          set-java-home: 'false'
          native-image-job-reports: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🧪 Run '${{ matrix.coordinates }}' tests"
        id: run-tests
        run: |
          set -euo pipefail

          mkdir -p test-all-results failure-logs
          : > test-all-results/failures.ndjson
          : > test-all-results/coordinates-to-test.txt

          record_failure() {
            local coordinates="$1"
            local failure_type="$2"
            local failed_command="$3"
            local log_file="$4"
            local name="${coordinates%:*}"
            local failed_version="${coordinates##*:}"

            tail -n "${LOG_LINES}" "$log_file" > test-all-results/log-tail.txt
            jq -c -n \
              --arg name "$name" \
              --arg os "${{ matrix.os }}" \
              --arg jdk "${{ matrix.version }}" \
              --arg nativeImageMode "${{ matrix.nativeImageMode }}" \
              --arg runnerLogUrl "$RUNNER_LOG_URL" \
              --arg failureType "$failure_type" \
              --arg failedVersion "$failed_version" \
              --arg failedCommand "$failed_command" \
              --arg logLines "$LOG_LINES" \
              --rawfile logTail test-all-results/log-tail.txt \
              '{
                name: $name,
                os: $os,
                version: $jdk,
                nativeImageMode: $nativeImageMode,
                runnerLogUrl: $runnerLogUrl,
                failure: {
                  failureType: $failureType,
                  failedVersion: $failedVersion,
                  failedCommand: $failedCommand,
                  logLines: $logLines,
                  logTail: $logTail
                }
              }' >> test-all-results/failures.ndjson
          }

          RUNNER_LOG_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          MATCHING_MATRIX_OUTPUT_FILE="$(mktemp)"
          GITHUB_OUTPUT="$MATCHING_MATRIX_OUTPUT_FILE" ./gradlew generateMatrixMatchingCoordinates -Pcoordinates="${{ matrix.coordinates }}"
          cp "$MATCHING_MATRIX_OUTPUT_FILE" test-all-results/matching-matrix.txt
          sed -n 's/^matrix=//p' test-all-results/matching-matrix.txt | jq -r '.coordinates[]' | sort > test-all-results/batch-coordinates.txt
          if [[ ! -s test-all-results/batch-coordinates.txt ]]; then
            echo "No coordinates were resolved for ${{ matrix.coordinates }}"
            exit 1
          fi

          set +e
          ./gradlew pullAllowedDockerImages -Pcoordinates="${{ matrix.coordinates }}" 2>&1 | tee test-all-results/pull-batch.log
          PULL_RESULT="${PIPESTATUS[0]}"
          set -e

          if [[ "$PULL_RESULT" -eq 0 ]]; then
            cp test-all-results/batch-coordinates.txt test-all-results/coordinates-to-test.txt
          else
            echo "Batch Docker image pull failed. Pulling images per coordinate to isolate the failing library versions."
            while IFS= read -r coordinates; do
              safe_coordinates="$(printf '%s' "$coordinates" | tr '/:' '--')"
              pull_log="failure-logs/pull-$safe_coordinates.log"
              pull_command="./gradlew pullAllowedDockerImages -Pcoordinates=\"$coordinates\""

              set +e
              ./gradlew pullAllowedDockerImages -Pcoordinates="$coordinates" 2>&1 | tee "$pull_log"
              coordinate_pull_result="${PIPESTATUS[0]}"
              set -e

              if [[ "$coordinate_pull_result" -eq 0 ]]; then
                printf '%s\n' "$coordinates" >> test-all-results/coordinates-to-test.txt
              else
                record_failure "$coordinates" "docker image pull" "$pull_command" "$pull_log"
              fi
            done < test-all-results/batch-coordinates.txt
          fi

          if [[ ! -s test-all-results/coordinates-to-test.txt ]]; then
            echo "No coordinates remain testable after Docker image pull failures."
          else
            bash ./.github/workflows/scripts/disable-docker.sh

            if [[ "$PULL_RESULT" -eq 0 ]]; then
              set +e
              ./gradlew test -Pcoordinates="${{ matrix.coordinates }}" 2>&1 | tee test-all-results/batch-test.log
              BATCH_TEST_RESULT="${PIPESTATUS[0]}"
              set -e
            else
              BATCH_TEST_RESULT=1
            fi

            if [[ "$BATCH_TEST_RESULT" -ne 0 ]]; then
              echo "Batch tests failed. Running each coordinate in the batch to find concrete failures."
              while IFS= read -r coordinates; do
                safe_coordinates="$(printf '%s' "$coordinates" | tr '/:' '--')"
                version="${coordinates##*:}"
                versions_json="$(jq -nc --arg version "$version" '[$version]')"
                test_log="failure-logs/test-$safe_coordinates.log"

                set +e
                bash ./.github/workflows/scripts/run-consecutive-tests.sh "$coordinates" "$versions_json" 2>&1 | tee "$test_log"
                test_result="${PIPESTATUS[0]}"
                set -e

                failed_line="$(grep -a "^FAILED" "$test_log" | head -n 1 || true)"
                if [[ -n "$failed_line" ]]; then
                  failure_type="$(printf '%s\n' "$failed_line" | awk -F'[][]' '{print $2}')"
                  failed_version="$(printf '%s\n' "$failed_line" | awk -F'[][]' '{print $4}')"
                  failed_command="$(printf '%s\n' "$failed_line" | awk -F'[][]' '{print $6}')"
                  record_failure "${coordinates%:*}:$failed_version" "$failure_type" "$failed_command" "$test_log"
                elif [[ "$test_result" -ne 0 ]]; then
                  record_failure "$coordinates" "test harness" "bash ./.github/workflows/scripts/run-consecutive-tests.sh \"$coordinates\" '$versions_json'" "$test_log"
                fi
              done < test-all-results/coordinates-to-test.txt
            fi
          fi

          if [[ -s test-all-results/failures.ndjson ]]; then
            jq -s '{ failures: . }' test-all-results/failures.ndjson > result.json
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
          else
            jq -n '{ failures: [] }' > result.json
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "📝 Compute artifact names"
        id: artifact-name
        run: |
          SAFE_COORDINATES="$(printf '%s' '${{ matrix.coordinates }}' | tr '/:' '--')"
          SAFE_MODE="$(printf '%s' '${{ matrix.nativeImageMode }}' | tr '/:' '--')"
          echo "artifact_name=test-all-metadata-result-$SAFE_COORDINATES-${{ matrix.version }}-${{ matrix.os }}-$SAFE_MODE" >> "$GITHUB_OUTPUT"
          echo "failure_logs_artifact_name=test-all-metadata-failure-logs-$SAFE_COORDINATES-${{ matrix.version }}-${{ matrix.os }}-$SAFE_MODE" >> "$GITHUB_OUTPUT"
          echo "result_file=result-$SAFE_COORDINATES-${{ matrix.version }}-${{ matrix.os }}-$SAFE_MODE.json" >> "$GITHUB_OUTPUT"

      - name: "📝 Rename result file for merged download"
        run: mv result.json "${{ steps.artifact-name.outputs.result_file }}"

      - name: "📦 Upload result artifact"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.artifact-name.outputs.artifact_name }}
          path: ${{ steps.artifact-name.outputs.result_file }}
          if-no-files-found: error

      - name: "📦 Upload failure log artifact"
        if: steps.run-tests.outputs.has_failures == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.artifact-name.outputs.failure_logs_artifact_name }}
          path: |
            failure-logs
            test-all-results
            ${{ steps.artifact-name.outputs.result_file }}
          if-no-files-found: error

      - name: "❌ Fail batch when metadata tests failed"
        if: steps.run-tests.outputs.has_failures == 'true'
        run: exit 1

  process-results:
    name: "🧪 Process results"
    runs-on: "ubuntu-22.04"
    permissions:
      actions: read
      contents: read
    needs:
      - get-all-metadata
      - test-all-metadata
    if: always() && github.repository == 'oracle/graalvm-reachability-metadata' && needs.get-all-metadata.result == 'success'
    outputs:
      has-failures: ${{ steps.aggregate.outputs.has-failures }}
    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: "📥 Download matrix results"
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: test-all-metadata-results
          pattern: test-all-metadata-result-*
          merge-multiple: true

      - name: "🧮 Aggregate test results"
        id: aggregate
        run: |
          set -euo pipefail

          mapfile -t RESULT_FILES < <(find test-all-metadata-results -type f -name 'result-*.json' | sort)
          if [[ "${#RESULT_FILES[@]}" -eq 0 ]]; then
            echo "No result artifacts were found under test-all-metadata-results"
            exit 1
          fi

          jq -s '
            [.[].failures[]?]
            | sort_by(.name)
            | group_by(.name)
            | map({
                name: .[0].name,
                failures: (
                  sort_by(.failure.failedVersion)
                  | group_by(.failure.failedVersion)
                  | map({
                      failedVersion: .[0].failure.failedVersion,
                      failureTypes: (map(.failure.failureType) | unique),
                      environments: map({
                        os: .os,
                        jdk: .version,
                        nativeImageMode: .nativeImageMode,
                        failureType: .failure.failureType,
                        failedCommand: .failure.failedCommand,
                        runnerLogUrl: .runnerLogUrl,
                        logLines: .failure.logLines,
                        logTail: .failure.logTail
                      })
                    })
                )
              })
            | { failures: . }
          ' "${RESULT_FILES[@]}" > aggregate-results.json

          if jq -e '.failures | length > 0' aggregate-results.json > /dev/null; then
            echo "has-failures=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-failures=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "📦 Upload aggregate failure report"
        if: steps.aggregate.outputs.has-failures == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-all-metadata-aggregate-failures
          path: aggregate-results.json
          if-no-files-found: error

  all-metadata-passed:
    name: "🧪 All metadata tests have passed"
    runs-on: "ubuntu-22.04"
    timeout-minutes: 1
    needs:
      - test-all-metadata
      - process-results
    if: always() && github.repository == 'oracle/graalvm-reachability-metadata'
    steps:
      - name: "All tests passed"
        if: needs.test-all-metadata.result == 'success' && needs.process-results.result == 'success' && needs.process-results.outputs.has-failures != 'true'
        run: exit 0

      - name: "Some tests failed"
        if: needs.test-all-metadata.result != 'success' || needs.process-results.result != 'success' || needs.process-results.outputs.has-failures == 'true'
        run: exit 1
