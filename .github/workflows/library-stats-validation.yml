name: "Validate library stats"

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate-library-stats:
    name: "📊 Validate library stats JSON"
    runs-on: "ubuntu-22.04"
    timeout-minutes: 5
    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: "🔎 Detect relevant file changes"
        id: filter
        uses: ./.github/actions/detect-file-changes
        with:
          file-patterns: |
            - 'stats/stats.json'
            - 'stats/schemas/library-stats-schema*.json'
            - 'metadata/*/*/*/**'

      - name: "🔧 Setup Java"
        if: steps.filter.outputs.changed == 'true'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'graalvm'
          java-version: '21'

      - name: "Validate library stats"
        if: steps.filter.outputs.changed == 'true'
        run: |
          ./gradlew validateLibraryStats
