name: "Check code style"

on:
  pull_request:

concurrency:
  group: "workflow = ${{ github.workflow }}, ref = ${{ github.event.ref }}, pr = ${{ github.event.pull_request.id }}"
  cancel-in-progress: true

jobs:
  detect-relevant-changes:
    name: "📋 Detect relevant file changes"
    runs-on: "ubuntu-22.04"
    timeout-minutes: 5
    outputs:
      relevant-files-changed: ${{ steps.filter.outputs.changed }}
    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v4

      - name: "🔎 Detect relevant file changes"
        id: filter
        uses: ./.github/actions/detect-file-changes
        with:
          file-patterns: |
            - '!docs/**'
            - '!**.md'
            - '!library-and-framework-list*.json'

  spotless:
    name: "✨ Spotless"
    if: needs.detect-relevant-changes.outputs.relevant-files-changed == 'true'
    needs: detect-relevant-changes
    runs-on: "ubuntu-22.04"
    timeout-minutes: 10
    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v4

      - name: "🔧 Setup java"
        uses: actions/setup-java@v4
        with:
          distribution: 'graalvm'
          java-version: '21'

      - name: "Run Spotless"
        run: ./gradlew spotlessCheck --console=plain

  checkstyle-shards:
    name: "📋 Checkstyle shard ${{ matrix.coordinates }}"
    if: needs.detect-relevant-changes.outputs.relevant-files-changed == 'true'
    needs: detect-relevant-changes
    runs-on: "ubuntu-22.04"
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        coordinates:
          - "1/8"
          - "2/8"
          - "3/8"
          - "4/8"
          - "5/8"
          - "6/8"
          - "7/8"
          - "8/8"
    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@v4

      - name: "🔧 Setup java"
        uses: actions/setup-java@v4
        with:
          distribution: 'graalvm'
          java-version: '21'

      - name: "Run Checkstyle"
        run: ./gradlew checkstyle -Pcoordinates=${{ matrix.coordinates }} --console=plain

  checkstyle:
    name: "📋 Check style according to checkstyle.xml"
    if: always()
    needs:
      - detect-relevant-changes
      - spotless
      - checkstyle-shards
    runs-on: "ubuntu-22.04"
    timeout-minutes: 1
    steps:
      - name: "Style checks passed"
        if: |
          needs.detect-relevant-changes.result == 'success' &&
          (
            needs.detect-relevant-changes.outputs.relevant-files-changed == 'false' ||
            (
              needs.spotless.result == 'success' &&
              needs.checkstyle-shards.result == 'success'
            )
          )
        run: exit 0

      - name: "Style checks failed"
        if: |
          needs.detect-relevant-changes.result == 'failure' ||
          (
            needs.detect-relevant-changes.outputs.relevant-files-changed == 'true' &&
            (
              needs.spotless.result == 'failure' ||
              needs.checkstyle-shards.result == 'failure' ||
              needs.spotless.result == 'cancelled' ||
              needs.checkstyle-shards.result == 'cancelled'
            )
          )
        run: exit 1
