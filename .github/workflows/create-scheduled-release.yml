# Scheduled release (weekly Monday): packages changed metadata after spotlessCheck.
# §CI-create-scheduled-release; NOT gated on §CI-test-all-metadata (sweep failures
# must not stall releases). Produces the nbt artifact (§FS-repository-functional-spec.4).
name: "Create scheduled release"

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-changed-metadata:
    name: "📋 Get a list of changed metadata"
    if: github.repository == 'oracle/graalvm-reachability-metadata'
    runs-on: "ubuntu-22.04"
    timeout-minutes: 5
    outputs:
      none-found: ${{ steps.set-matrix.outputs.none-found }}
    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: "🔧 Setup java"
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'graalvm'
          java-version: '25'

      - name: "🕸️ Get changed metadata matrix"
        id: set-matrix
        run: |
          LATEST_TAG=$(git tag --list | grep -E '^[0-9]+[.][0-9]+[.][0-9]+$' | sort -V | tail -1)
          # Keep the expanded matrix out of job outputs; the release job only needs none-found.
          GRADLE_OUTPUT=$(mktemp)
          GITHUB_OUTPUT="$GRADLE_OUTPUT" ./gradlew generateChangedCoordinatesMatrix -PbaseCommit="$(git show-ref -s "$LATEST_TAG")" -PnewCommit="$(git rev-parse HEAD)"
          grep '^none-found=' "$GRADLE_OUTPUT" >> "$GITHUB_OUTPUT"

  release:
    needs: get-changed-metadata
    if: needs.get-changed-metadata.result == 'success' && needs.get-changed-metadata.outputs.none-found != 'true'
    name: "🚀 Create a release"
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: "🔧 Setup java"
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'graalvm'
          java-version: '25'

      - name: "Get tags"
        run: |
          PREVIOUS_RELEASE_TAG=$(git tag --list | grep -E '^[0-9]+[.][0-9]+[.][0-9]+$' | sort -V | tail -1)
          if [[ ! "$PREVIOUS_RELEASE_TAG" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "Unexpected release tag format: $PREVIOUS_RELEASE_TAG" >&2
            exit 1
          fi

          IFS=. read -r MAJOR MINOR PATCH <<< "$PREVIOUS_RELEASE_TAG"
          CURRENT_RELEASE_TAG="${MAJOR}.${MINOR}.$((PATCH + 1))"

          printf 'PREVIOUS_RELEASE_TAG=%s\n' "$PREVIOUS_RELEASE_TAG" >> "$GITHUB_ENV"
          printf 'CURRENT_RELEASE_TAG=%s\n' "$CURRENT_RELEASE_TAG" >> "$GITHUB_ENV"

      - name: "⬆️ Update version"
        run: |
          sed -i "s/project.version(\"1.0.0-SNAPSHOT\")/project.version(\"${{ env.CURRENT_RELEASE_TAG }}\")/g" build.gradle

      - name: "🔍 Run spotless check"
        run: |
          ./gradlew spotlessCheck

      - name: "🏭 Generate release artifacts"
        run: |
          ./gradlew package

      - name: "📄 Commit changes"
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "Github Actions"
          git add .
          git commit -m "Release version ${{ env.CURRENT_RELEASE_TAG }}"
          git tag "${{ env.CURRENT_RELEASE_TAG }}"
          git push origin "${{ env.CURRENT_RELEASE_TAG }}"

      - name: "📝 Publish a release"
        run: |
          NOTES_JSON=$(mktemp)
          NOTES_FILE=$(mktemp)
          COMPARE_URL="https://github.com/${{ github.repository }}/compare/${{ env.PREVIOUS_RELEASE_TAG }}...${{ env.CURRENT_RELEASE_TAG }}"

          gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${{ env.CURRENT_RELEASE_TAG }}" \
            -f previous_tag_name="${{ env.PREVIOUS_RELEASE_TAG }}" \
            > "$NOTES_JSON"

          jq -r --arg compareUrl "$COMPARE_URL" '.body | if length > 120000 then (.[0:120000] | split("\n")[:-1] | join("\n")) + "\n\n_Release notes truncated because GitHub release bodies are limited to 125,000 characters._\n\n_Full changelog: \($compareUrl)_" else . end' "$NOTES_JSON" > "$NOTES_FILE"

          gh release create "${{ env.CURRENT_RELEASE_TAG }}" build/graalvm-reachability-metadata-*.zip --title "${{ env.CURRENT_RELEASE_TAG }}" --notes-file "$NOTES_FILE"
