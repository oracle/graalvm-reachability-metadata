name: "Create scheduled release"

on:
  schedule:
    - cron: "0 3 1 * *"
    - cron: "0 3 15 * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  check-last-test-all:
    name: "📋 Check last test-all metadata run"
    if: github.repository == 'oracle/graalvm-reachability-metadata'
    runs-on: "ubuntu-22.04"
    timeout-minutes: 5
    outputs:
      can-release: ${{ steps.check.outputs.can-release }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: "🔎 Check latest completed test-all metadata run"
        id: check
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "can-release=true" >> "$GITHUB_OUTPUT"
            echo "Manual release dispatch bypasses the test-all metadata gate."
            exit 0
          fi

          LAST_RUN_JSON="$(
            gh run list \
              --repo "${{ github.repository }}" \
              --workflow "test-all-metadata.yml" \
              --branch "master" \
              --status "completed" \
              --limit 1 \
              --json databaseId,conclusion,url
          )"

          if [[ "$(printf '%s' "$LAST_RUN_JSON" | jq 'length')" -eq 0 ]]; then
            echo "can-release=false" >> "$GITHUB_OUTPUT"
            echo "No completed test-all metadata workflow run was found."
            exit 0
          fi

          CONCLUSION="$(printf '%s' "$LAST_RUN_JSON" | jq -r '.[0].conclusion')"
          RUN_URL="$(printf '%s' "$LAST_RUN_JSON" | jq -r '.[0].url')"
          echo "Latest completed test-all metadata run: $RUN_URL ($CONCLUSION)"

          if [[ "$CONCLUSION" == "success" ]]; then
            echo "can-release=true" >> "$GITHUB_OUTPUT"
          else
            echo "can-release=false" >> "$GITHUB_OUTPUT"
          fi

  get-changed-metadata:
    name: "📋 Get a list of changed metadata"
    needs: check-last-test-all
    if: github.repository == 'oracle/graalvm-reachability-metadata' && needs.check-last-test-all.outputs.can-release == 'true'
    runs-on: "ubuntu-22.04"
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      none-found: ${{ steps.set-matrix.outputs.none-found }}
    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: "🔧 Setup java"
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'graalvm'
          java-version: '21'

      - name: "🕸️ Get changed metadata matrix"
        id: set-matrix
        run: |
          LATEST_TAG=$(git tag --list | sort -V | tail -1)
          ./gradlew generateChangedCoordinatesMatrix -PbaseCommit=$(git show-ref -s $LATEST_TAG) -PnewCommit=$(git rev-parse HEAD)

  release:
    needs: get-changed-metadata
    if: needs.get-changed-metadata.result == 'success' && needs.get-changed-metadata.outputs.none-found != 'true'
    name: "🚀 Create a release"
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: "☁️ Checkout repository"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: "🔧 Setup java"
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'graalvm'
          java-version: '21'

      - name: "Get tags"
        run: |
          PREVIOUS_RELEASE_TAG=$(git tag --list | sort -V | tail -1)
          echo "PREVIOUS_RELEASE_TAG=$PREVIOUS_RELEASE_TAG" >> ${GITHUB_ENV}

          CURRENT_RELEASE_TAG=$(sed -E 's/^([0-9]+\.)([0-9]+\.)([0-9]+)/echo \1\2$((\3+1))/e' <<< $PREVIOUS_RELEASE_TAG)
          echo "CURRENT_RELEASE_TAG=$CURRENT_RELEASE_TAG" >> ${GITHUB_ENV}

      - name: "⬆️ Update version"
        run: |
          sed -i "s/project.version(\"1.0.0-SNAPSHOT\")/project.version(\"${{ env.CURRENT_RELEASE_TAG }}\")/g" build.gradle

      - name: "🔍 Run spotless check"
        run: |
          ./gradlew spotlessCheck

      - name: "🏭 Generate release artifacts"
        run: |
          ./gradlew package

      - name: "📄 Commit changes"
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "Github Actions"
          git add .
          git commit -m "Release version ${{ env.CURRENT_RELEASE_TAG }}"
          git tag ${{ env.CURRENT_RELEASE_TAG }}
          git push origin ${{ env.CURRENT_RELEASE_TAG }}

      - name: "📝 Publish a release"
        run: |
          gh release create ${{ env.CURRENT_RELEASE_TAG }} build/graalvm-reachability-metadata-*.zip --generate-notes --notes-start-tag ${{ env.PREVIOUS_RELEASE_TAG }}
