import groovy.json.JsonSlurper
import org.graalvm.internal.tck.utils.DynamicAccessUtils
import org.graalvm.internal.tck.utils.NativeImageConfigUtils

import org.graalvm.buildtools.gradle.tasks.BuildNativeImageTask
import org.graalvm.buildtools.gradle.tasks.NativeRunTask
import org.gradle.api.tasks.PathSensitivity

import java.util.jar.JarFile

plugins {
    id 'org.graalvm.internal.tck-base'
    id 'checkstyle'
    id 'java-library'
    id 'org.graalvm.buildtools.native'
    id 'jacoco'
}

repositories {
    mavenLocal()
    mavenCentral()
}

tasks.withType(JavaCompile).configureEach {
    options.release = 21
}

tasks.withType(org.graalvm.buildtools.gradle.tasks.BuildNativeImageTask).configureEach { task ->
    if (task.name == "nativeTestCompile") {
        // Restrict cacheability to the dynamic-access reporting lane.
        task.outputs.cacheIf("Enabled only when generating dynamic-access reports") {
            boolean propertyEnabled = providers.gradleProperty('tck.generateDynamicAccessReport')
                    .map { value -> value.toBoolean() }
                    .getOrElse(false)
            boolean taskRequested = gradle.startParameter.taskNames.any { taskName ->
                taskName == "generateDynamicAccessReport" || taskName.endsWith(":generateDynamicAccessReport")
            }
            propertyEnabled || taskRequested
        }
    }
}

checkstyle {
    configFile tck.repoRoot.file("gradle/checkstyle.xml").get().asFile
}

tasks.register("checkstyle") {
    description = "Runs all checkstyle tasks"
    group = JavaBasePlugin.VERIFICATION_GROUP
    dependsOn tasks.withType(Checkstyle)
}

tasks.withType(Checkstyle).configureEach {
    exclude {
        it.file.absolutePath.contains('generated')
    }
}

String metadataPath = Objects.requireNonNullElse(
		System.getenv("GVM_TCK_MD"),
		providers.gradleProperty('metadata.dir').get()
)

String libraryVersion = System.getenv("GVM_TCK_LV") ?: providers.gradleProperty('library.version').get()

String libraryGAV = System.getenv("GVM_TCK_LC") ?: providers.gradleProperty('library.coordinates').getOrElse(null)
libraryGAV = libraryGAV ?: ""
String libraryGA = ""
def libraryGAVParts = libraryGAV.split(":")
if (libraryGAVParts.length >= 2) {
    libraryGA = "${libraryGAVParts[0]}:${libraryGAVParts[1]}"
}

String overrideVal = System.getenv("GVM_TCK_EXCLUDE") ?: providers.gradleProperty('library.override').getOrElse(null)
overrideVal = overrideVal ?: "false"
boolean override = overrideVal.toBoolean()

String generateDynamicAccessReportVal = providers.gradleProperty('tck.generateDynamicAccessReport').getOrElse("false")
boolean generateDynamicAccessReportTaskRequested = gradle.startParameter.taskNames.any { taskName ->
    taskName == "generateDynamicAccessReport" || taskName.endsWith(":generateDynamicAccessReport")
}
boolean generateDynamicAccessReport = generateDynamicAccessReportVal.toBoolean() || generateDynamicAccessReportTaskRequested

Closure<Boolean> isTaskRequested = { String taskName ->
    gradle.startParameter.taskNames.any { String requestedTaskName ->
        requestedTaskName == taskName || requestedTaskName.endsWith(":${taskName}")
    }
}

boolean informationalTaskRequested = isTaskRequested("help") || isTaskRequested("tasks") || isTaskRequested("properties")
boolean nativeTraceImageTaskRequested = !informationalTaskRequested &&
        (isTaskRequested("nativeTraceImage") || isTaskRequested("runNativeTraceImage"))
boolean runNativeTraceImageTaskRequested = !informationalTaskRequested && isTaskRequested("runNativeTraceImage")
boolean verifyExactReachabilityMetadataTaskRequested = !informationalTaskRequested &&
        isTaskRequested("verifyExactReachabilityMetadata")

Closure<String> requiredGradleProperty = { String propertyName ->
    String propertyValue = providers.gradleProperty(propertyName).getOrElse("")
    if (propertyValue.trim().isEmpty()) {
        throw new GradleException("Missing '${propertyName}' property! Rerun Gradle with '-P${propertyName}=<value>'")
    }
    return propertyValue
}

Closure<List<String>> commaSeparatedGradleProperty = { String propertyName ->
    String propertyValue = providers.gradleProperty(propertyName).getOrElse("")
    if (propertyValue.trim().isEmpty()) {
        return []
    }
    return propertyValue.split(",")
            .collect { String value -> value.trim() }
            .findAll { String value -> !value.isEmpty() }
}

Closure<List<File>> requiredDirectoryListProperty = { String propertyName, boolean requireAbsolute ->
    List<String> propertyValues = commaSeparatedGradleProperty(propertyName)
    if (propertyValues.isEmpty()) {
        requiredGradleProperty(propertyName)
    }
    return propertyValues.collect { String propertyValue ->
        File directory = file(propertyValue)
        if (requireAbsolute && !new File(propertyValue).isAbsolute()) {
            throw new GradleException("Property '${propertyName}' must contain absolute paths. Got: ${propertyValue}")
        }
        if (!directory.isDirectory()) {
            throw new GradleException("Property '${propertyName}' must contain existing directories. Missing: ${directory.absolutePath}")
        }
        return directory
    }
}

Closure<String> requiredAbsolutePathProperty = { String propertyName ->
    String propertyValue = requiredGradleProperty(propertyName)
    if (!new File(propertyValue).isAbsolute()) {
        throw new GradleException("Property '${propertyName}' must contain an absolute path. Got: ${propertyValue}")
    }
    return propertyValue
}

Closure<String> nativeImageTool = { String toolName ->
    List<String> toolHomeVariables = ["GRAALVM_HOME", "JAVA_HOME"]
    for (String toolHomeVariable : toolHomeVariables) {
        String toolHome = System.getenv(toolHomeVariable)
        if (toolHome != null && !toolHome.trim().isEmpty()) {
            List<File> candidates = [
                    new File(new File(toolHome, "bin"), toolName),
                    new File(new File(new File(toolHome, "lib"), "svm/bin"), toolName)
            ]
            File candidate = candidates.find { File file -> file.isFile() }
            if (candidate != null) {
                return candidate.absolutePath
            }
        }
    }
    return toolName
}

if (runNativeTraceImageTaskRequested) {
    requiredAbsolutePathProperty("traceMetadataPath")
    requiredGradleProperty("traceMetadataConditionPackages")
}
if (nativeTraceImageTaskRequested && project.hasProperty("metadataConfigDirs")) {
    requiredDirectoryListProperty("metadataConfigDirs", false)
}
if (verifyExactReachabilityMetadataTaskRequested) {
    requiredGradleProperty("metadataConfigDirs")
    requiredGradleProperty("conditionPackages")
    requiredDirectoryListProperty("metadataConfigDirs", true)
}

// Determine native-image build arguments from ci.json.
def ciJsonFile = tck.repoRoot.file("ci.json").get().asFile
def nativeImageArgs = []
if (ciJsonFile.exists()) {
    try {
        def parsed = new JsonSlurper().parse(ciJsonFile)
        String selectedNativeImageMode = NativeImageConfigUtils.resolveSelectedMode(
                System.getenv("GVM_TCK_NATIVE_IMAGE_MODE"),
                providers.gradleProperty("tck.nativeImageMode").getOrElse(null)
        )
        nativeImageArgs = NativeImageConfigUtils.resolvedBuildArgs(
                parsed as Map<String, Object>,
                selectedNativeImageMode,
                [
                        "{{library.version}}"    : libraryVersion,
                        "{{library.coordinates}}": libraryGAV
                ]
        )
    } catch (GradleException e) {
        throw e
    } catch (Exception e) {
        throw new GradleException("Failed to resolve native-image args from ci.json", e)
    }
} else {
    throw new GradleException("Required configuration file ci.json not found at expected path: ${ciJsonFile.absolutePath}\"")
}

tck.testedLibraryVersion = libraryVersion
// This value can be used to request specific library version to test with.

dependencies {
    testImplementation(platform(libs.test.junit.bom))
    testImplementation(libs.test.junit.jupiter.core)
    testImplementation(libs.test.junit.vintage)
    testImplementation "org.graalvm:tck-test-support:1.0.0-SNAPSHOT"
    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
}

Closure<List<File>> resolveTestedLibraryJars = {
    String targetGroup = ""
    String targetArtifact = ""
    String targetVersion = ""
    def coordsParts = (libraryGAV ?: "").split(":")
    if (coordsParts.length >= 3) {
        targetGroup = coordsParts[0]
        targetArtifact = coordsParts[1]
        targetVersion = coordsParts[2]
    }

    def artifacts = configurations.testRuntimeClasspath.resolvedConfiguration.resolvedArtifacts
    Set<File> matched = new LinkedHashSet<>(artifacts.findAll { artifact ->
        (artifact.moduleVersion.id.group == targetGroup) && (artifact.moduleVersion.id.name == targetArtifact)
    }.collect { artifact ->
        artifact.file
    })

    if (matched.isEmpty()) {
        // Fallback for relocated or substituted modules: the requested G:A coordinates may resolve
        // to a different group in published metadata, so no resolved artifact carries the original group.
        matched.addAll(artifacts.findAll { artifact ->
            (artifact.moduleVersion.id.name == targetArtifact) && (artifact.moduleVersion.id.version == targetVersion)
        }.collect { artifact ->
            artifact.file
        })
    }

    if (matched.isEmpty()) {
        throw new GradleException("No eligible artifacts found on the classpath for ${libraryGAV}.\nPlease verify that the provided artifact exists.")
    }

    return matched.toList().sort { File file -> file.absolutePath }
}

tasks.register("listLibraryJars") { task ->
    task.setDescription("Lists resolved JARs for the tested library (one per line)")
    task.setGroup(JavaBasePlugin.VERIFICATION_GROUP)
    task.doLast {
        resolveTestedLibraryJars().each { File file ->
            println file.absolutePath
        }
    }
}

Provider<Directory> dynamicAccessOutputDir = layout.buildDirectory.dir("native/nativeTestCompile/dynamic-access")

tasks.register("generateDynamicAccessReport") { task ->
    task.setDescription("Builds native tests with dynamic-access tracking and reuses Gradle up-to-date checks when inputs and classpath are unchanged")
    task.setGroup(JavaBasePlugin.VERIFICATION_GROUP)
    task.dependsOn(tasks.named("nativeTestCompile"))
    // JARs resolve from the Gradle cache where filenames are content-addressed, so name-only is sufficient.
    task.inputs.files(providers.provider { resolveTestedLibraryJars() })
            .withPropertyName("trackedLibraryJars")
            .withPathSensitivity(PathSensitivity.NAME_ONLY)
    task.inputs.files(sourceSets.test.output)
            .withPropertyName("testOutputs")
            .withPathSensitivity(PathSensitivity.RELATIVE)
    // metadataPath is scoped to the active coordinate via GVM_TCK_MD / -Pmetadata.dir, not the repo-wide metadata root.
    task.inputs.files(fileTree(metadataPath) { include("**/*.json") })
            .withPropertyName("metadataFiles")
            .withPathSensitivity(PathSensitivity.RELATIVE)
    task.inputs.file(ciJsonFile)
            .withPropertyName("ciJsonFile")
            .withPathSensitivity(PathSensitivity.RELATIVE)
    task.inputs.property("nativeImageArgs", providers.provider { nativeImageArgs })
    task.outputs.dir(dynamicAccessOutputDir)
            .withPropertyName("dynamicAccessOutputDir")
}

Provider<List<String>> nativeTraceBuildArgs = providers.provider {
    List<String> buildArgs = []
    if (nativeTraceImageTaskRequested) {
        buildArgs.add("-H:+UnlockExperimentalVMOptions")
        buildArgs.add("-H:+MetadataTracingSupport")
        buildArgs.add("-H:-UnlockExperimentalVMOptions")
    }
    List<String> metadataConfigDirs = commaSeparatedGradleProperty("metadataConfigDirs")
    boolean metadataConfigDirsRequested = nativeTraceImageTaskRequested || verifyExactReachabilityMetadataTaskRequested
    if (metadataConfigDirsRequested && !metadataConfigDirs.isEmpty()) {
        buildArgs.add("-H:ConfigurationFileDirectories=${metadataConfigDirs.join(",")}")
    }
    if (verifyExactReachabilityMetadataTaskRequested) {
        // --exact-reachability-metadata is scoped globally and takes no value;
        // the supplied conditionPackages flow to the binary at run time as
        // -XX:TraceMetadataConditionPackages on the run task that invokes the
        // image.
        buildArgs.add("--exact-reachability-metadata")
    }
    if (runNativeTraceImageTaskRequested) {
        // The verification gate runs runNativeTraceImage in its correction
        // loop and routes on the binary's exit code. Bake exact-metadata
        // reporting + Exit-on-missing into the trace binary so the gate can
        // observe ExitStatus.MISSING_METADATA (172) for a metadata gap and
        // distinguish it from other test failures, while still collecting
        // trace metadata in the same run.
        buildArgs.add("--exact-reachability-metadata")
        buildArgs.add("-H:MissingRegistrationReportingMode=Exit")
    }
    return buildArgs
}

tasks.named("nativeTestCompile", BuildNativeImageTask).configure { BuildNativeImageTask task ->
    if (verifyExactReachabilityMetadataTaskRequested) {
        task.outputs.upToDateWhen { false }
    }
    if (runNativeTraceImageTaskRequested) {
        task.doFirst {
            requiredGradleProperty("traceMetadataPath")
            requiredGradleProperty("traceMetadataConditionPackages")
        }
    }
    if (verifyExactReachabilityMetadataTaskRequested) {
        task.doFirst {
            requiredDirectoryListProperty("metadataConfigDirs", true)
            requiredGradleProperty("conditionPackages")
        }
    }
}

tasks.register("nativeTraceImage") { task ->
    task.setDescription("Builds the test native image with runtime metadata tracing support enabled")
    task.setGroup(LifecycleBasePlugin.BUILD_GROUP)
    task.dependsOn(tasks.named("nativeTestCompile"))
}

tasks.register("runNativeTraceImage", Exec) { Exec task ->
    task.setDescription("Runs the trace-enabled test native image once and writes runtime metadata trace output")
    task.setGroup(JavaBasePlugin.VERIFICATION_GROUP)
    task.dependsOn(tasks.named("nativeTraceImage"))
    task.ignoreExitValue = true
    task.doFirst {
        String traceMetadataPath = requiredAbsolutePathProperty("traceMetadataPath")
        String traceMetadataConditionPackages = requiredGradleProperty("traceMetadataConditionPackages")
        BuildNativeImageTask nativeTestCompile = tasks.named("nativeTestCompile", BuildNativeImageTask).get()
        NativeRunTask nativeTest = tasks.named("nativeTest", NativeRunTask).get()
        File imageFile = nativeTestCompile.outputFile.get().asFile
        List<String> runtimeArgs = []
        runtimeArgs.addAll(nativeTest.internalRuntimeArgs.get())
        runtimeArgs.addAll(nativeTest.runtimeArgs.get())
        runtimeArgs.add("-XX:TraceMetadata=path=${traceMetadataPath}")
        runtimeArgs.add("-XX:TraceMetadataConditionPackages=${traceMetadataConditionPackages}")
        task.executable = imageFile.absolutePath
        task.args = runtimeArgs
    }
}

tasks.register("mergeNativeTraceMetadata", Exec) { Exec task ->
    task.setDescription("Merges runtime metadata trace output directories with native-image-utils generate")
    task.setGroup("Metadata")
    task.doFirst {
        List<File> inputDirs = requiredDirectoryListProperty("inputDirs", false)
        File outputDir = file(requiredAbsolutePathProperty("outputDir"))
        delete(outputDir)
        List<String> commandLineArgs = [nativeImageTool("native-image-utils"), "generate"]
        commandLineArgs.addAll(inputDirs.collect { File inputDir -> "--input-dir=${inputDir.absolutePath}" })
        commandLineArgs.add("--output-dir=${outputDir.absolutePath}")
        task.commandLine(commandLineArgs)
    }
}

tasks.register("verifyExactReachabilityMetadata") { task ->
    task.setDescription("Builds the test native image with exact reachability metadata for the supplied packages")
    task.setGroup(JavaBasePlugin.VERIFICATION_GROUP)
    task.dependsOn(tasks.named("nativeTestCompile"))
    task.doFirst {
        requiredDirectoryListProperty("metadataConfigDirs", true)
        requiredGradleProperty("conditionPackages")
    }
}

// Ensure detailed exception/stacktrace logging for all Test tasks, including nativeTest
tasks.withType(Test).configureEach {
    testLogging {
        // Options: 'full' or 'short'; use full to include stack traces and causes
        exceptionFormat = 'full'
        showExceptions = true
        showCauses = true
        showStackTraces = true
    }
}

tasks.named('test') {
    useJUnitPlatform()
}

 // Configure JaCoCo report to analyze only the effective classes of the target library (handles multi-release JARs)
tasks.withType(org.gradle.testing.jacoco.tasks.JacocoReport).configureEach { r ->
    r.dependsOn(tasks.named('test'))

    reports {
        xml.required = true
        html.required = false
        csv.required = false
    }

    // Collect resolved dependency artifacts from the test runtime classpath
    def matched = resolveTestedLibraryJars()

    // Produce one deterministic directory of .class files that represents exactly what the JVM would load at runtime for a given library jar, without duplicates
    int runtimeMajor = (JavaVersion.current().majorVersion as int)

    def effectiveDirs = matched.collect { File jarFile ->
        String safe = jarFile.name.replaceAll(/[^A-Za-z0-9]/, '_')
        layout.buildDirectory.dir("jacoco/effective/${safe}").get().asFile
    }

    r.inputs.files(matched)
    r.outputs.dirs(effectiveDirs)

    r.doFirst {
        matched.eachWithIndex { File jarFile, int idx ->
            File outDir = effectiveDirs[idx]
            project.delete(outDir)
            project.copy { CopySpec c ->
                c.into(outDir)
                // Base classes only (exclude MR payload)
                c.from(zipTree(jarFile)) {
                    include '**/*.class'
                    exclude 'META-INF/versions/**'
                }

                // Overlay only versions that exist (<= runtimeMajor)
                def existingMrJavaVersions = new TreeSet<Integer>()
                new JarFile(jarFile).withCloseable { jf ->
                    jf.entries().each { e ->
                        def m = (e.name =~ /^META-INF\/versions\/(\d+)\//)
                        if (m.find()) {
                            int v = (m.group(1) as int)
                            if (v <= runtimeMajor) existingMrJavaVersions.add(v)
                        }
                    }
                }

                // Overlay multi-release JAR bytecode in ascending version order. For each META-INF/versions/<v>/ that exists (v ≤ runtime) copy its classes into the output
                // tree while stripping the MR prefix, so newer versioned classes overwrite older ones and the result matches JVM per-class selection semantics.
                existingMrJavaVersions.each { int v ->
                    c.from(zipTree(jarFile)) {
                        include "META-INF/versions/${v}/**/*.class"
                        eachFile { fcd ->
                            fcd.path = fcd.path.replaceFirst("^META-INF/versions/${v}/", "")
                        }
                    }
                }
                // Ensure later copies overwrite earlier ones
                c.duplicatesStrategy = DuplicatesStrategy.INCLUDE
            }
        }
    }

    r.classDirectories.setFrom(files(effectiveDirs))
    r.additionalClassDirs.setFrom()
}

graalvmNative {
    metadataRepository {
        enabled = true
        uri(tck.metadataRoot.get().asFile)
        if (verifyExactReachabilityMetadataTaskRequested && !libraryGA.isBlank()) {
            excludedModules.add(libraryGA)
        }
    }
    binaries {
        test {
            if (override || verifyExactReachabilityMetadataTaskRequested) {
                excludeConfig.put(libraryGAV, [".*"])
            }
            buildArgs.addAll(nativeImageArgs)
            buildArgs.addAll(nativeTraceBuildArgs)
            if (generateDynamicAccessReport) {
                buildArgs.addAll(providers.provider {
                    DynamicAccessUtils.buildArgsForClasspathEntries(resolveTestedLibraryJars())
                })
            }
        }
    }
}
