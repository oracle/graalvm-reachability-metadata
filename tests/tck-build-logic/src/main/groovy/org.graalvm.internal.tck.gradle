 // Configure JaCoCo report to analyze only the effective classes of the target library (handles multi-release JARs)
tasks.withType(org.gradle.testing.jacoco.tasks.JacocoReport).configureEach { r ->
    r.dependsOn(tasks.named('test'))

    reports {
        xml.required = true
        html.required = false
        csv.required = false
    }

    // Collect resolved dependency artifacts from the test runtime classpath
    def matched = resolveTestedLibraryJars()

    // Produce one deterministic directory of .class files that represents exactly what the JVM would load at runtime for a given library jar, without duplicates
    int runtimeMajor = (JavaVersion.current().majorVersion as int)

    def effectiveDirs = matched.collect { File jarFile ->
        String safe = jarFile.name.replaceAll(/[^A-Za-z0-9]/, '_')
        layout.buildDirectory.dir("jacoco/effective/${safe}").get().asFile
    }

    r.inputs.files(matched)
    r.outputs.dirs(effectiveDirs)

    r.doFirst {
        matched.eachWithIndex { File jarFile, int idx ->
            File outDir = effectiveDirs[idx]
            project.delete(outDir)
            project.copy { CopySpec c ->
                c.into(outDir)
                // Base classes only (exclude MR payload)
                c.from(zipTree(jarFile)) {
                    include '**/*.class'
                    exclude 'META-INF/versions/**'
                }

                // Overlay only versions that exist (<= runtimeMajor)
                def existingMrJavaVersions = new TreeSet<Integer>()
                new JarFile(jarFile).withCloseable { jf ->
                    jf.entries().each { e ->
                        def m = (e.name =~ /^META-INF\/versions\/(\d+)\//)
                        if (m.find()) {
                            int v = (m.group(1) as int)
                            if (v <= runtimeMajor) existingMrJavaVersions.add(v)
                        }
                    }
                }

                // Overlay multi-release JAR bytecode in ascending version order. For each META-INF/versions/<v>/ that exists (v ≤ runtime) copy its classes into the output
                // tree while stripping the MR prefix, so newer versioned classes overwrite older ones and the result matches JVM per-class selection semantics.
                existingMrJavaVersions.each { int v ->
                    c.from(zipTree(jarFile)) {
                        include "META-INF/versions/${v}/**/*.class"
                        eachFile { fcd ->
                            fcd.path = fcd.path.replaceFirst("^META-INF/versions/${v}/", "")
                        }
                    }
                }
                // Ensure later copies overwrite earlier ones
                c.duplicatesStrategy = DuplicatesStrategy.INCLUDE
            }
        }
    }

    r.classDirectories.setFrom(files(effectiveDirs))
    r.additionalClassDirs.setFrom()
}

graalvmNative {
    metadataRepository {
        enabled = true
        uri(tck.metadataRoot.get().asFile)
    }
    agent {
    }
    binaries {
        if (dedicatedLayer) {
            libDedicated {
                classpath.from(providers.provider { resolveDedicatedLayerClasspath() })
                buildArgs.addAll(providers.provider { resolveDedicatedLayerNativeImageArgs() })
                createLayer {
                    modules = BaseLayerUtils.layerModules()
                    jars.from(providers.provider { resolveDedicatedLayerJars() })
                }
            }
        }
        test {
            if (override) {
                excludeConfig.put(libraryGAV, [".*"])
            }
            buildArgs.addAll(nativeImageArgs)
            buildArgs.addAll(nativeTraceBuildArgs)
            if (dedicatedLayer) {
                buildArgs.add(coordinateMetadataArgument)
                buildArgs.addAll(providers.provider {
                    List<File> metadataDirectories = resolveDedicatedLayerReachabilityMetadataDirectories()
                    return metadataDirectories.isEmpty() ? [] : [
                            "-H:ConfigurationFileDirectories=" +
                                    metadataDirectories.collect { File file -> file.absolutePath }.join(",")
                    ]
                })
            }
            if (layeredNativeImage && !dedicatedLayer) {
                buildArgs.addAll([
                        "-H:+UnlockExperimentalVMOptions",
                        "-H:LayerUse=${baseLayerFile.absolutePath}",
                        "-H:LinkerRPath=${baseLayerFile.parentFile.absolutePath}",
                        "-H:-UnlockExperimentalVMOptions"
                ])
            }
            if (generateDynamicAccessReport) {
                buildArgs.addAll(providers.provider {
                    DynamicAccessUtils.buildArgsForClasspathEntries(resolveTestedLibraryJars())
                })
            }
            if (dedicatedLayer) {
                useLayer("libDedicated")
            }
        }
    }
}

if (dedicatedLayer) {
    tasks.named("nativeLibDedicatedCompile", BuildNativeImageTask).configure { task ->
        task.dependsOn(tasks.named("generateDedicatedLayerJUnitTestList"))
        task.dependsOn(tasks.named("prepareDedicatedLayerConfiguration"))
        task.outputDirectory.set(baseLayerFile.parentFile)
        task.doFirst {
            File workingDirectory = task.workingDirectory.get().asFile
            if (!workingDirectory.isDirectory() && !workingDirectory.mkdirs()) {
                throw new GradleException("Failed to create native-image working directory: " +
                        workingDirectory.absolutePath)
            }
        }
    }
}
