Map<String, Object> loadCi() {
    File f = project.file("ci.json")
    if (!f.exists()) {
        throw new GradleException("Missing ci.json in repo root")
    }
    new JsonSlurper().parse(f) as Map<String, Object>
}

Map<String, Object> matrixSectionFor(String section) {
    def ci = loadCi()
    def sec = ci[section]
    if (sec == null) throw new GradleException("Missing '${section}' in ci.json")
    sec as Map<String, Object>
}

Map<String, List<String>> matrixDefaultsFor(String section) {
    def sec = matrixSectionFor(section)
    [
            "version": (sec["java"] as List<String>),
            "os": (sec["os"] as List<String>)
    ]
}

List<String> nativeImageModesForMatrix() {
    NativeImageConfigUtils.modeNames(loadCi())
}

int versionsPerJobFor(String section) {
    def sec = matrixSectionFor(section)
    Object versionsPerJob = sec["versions-per-job"]
    if (versionsPerJob == null) {
        return 30
    }
    int value = Integer.parseInt(versionsPerJob.toString())
    if (value <= 0) {
        throw new GradleException("'${section}.versions-per-job' must be greater than zero")
    }
    value
}

List<Map<String, Object>> expandMatrixEntries(List<Map<String, Object>> entries, String section) {
    def defaults = matrixDefaultsFor(section)
    List<String> nativeImageModes = nativeImageModesForMatrix()
    NativeImageConfigUtils.expandMatrixEntries(
            entries,
            defaults["version"],
            defaults["os"],
            nativeImageModes,
            NativeImageConfigUtils.javaVersionsByMode(loadCi(), defaults["version"], nativeImageModes)
    )
}

Map<String, Object> springAotMatrixConfig() {
    def ci = loadCi()
    def sec = ci["generateAffectedSpringTestMatrix"]
    if (sec == null) throw new GradleException("Missing 'generateAffectedSpringTestMatrix' in ci.json")
    [
            "java-branch-mapping": (sec["java-branch-mapping"] as Map<String, String>),
            "os": sec["os"]
    ]
}

List<Map<String, Object>> expandNewLibraryVersionCompatibilityMatrix(List<Map<String, Object>> libraries) {
    int versionsPerJob = versionsPerJobFor("generateNewLibraryVersionCompatibilityMatrix")
    expandMatrixEntries(libraries.collect { Map<String, Object> library ->
        [
                "name"    : library["name"],
                "versions": (library["versions"] as List<?>)
                        .collect { it.toString() }
                        .take(versionsPerJob)
        ]
    }, "generateNewLibraryVersionCompatibilityMatrix")
}

List<Map<String, Object>> expandChangedTestedVersionsMatrix(List<Map<String, Object>> entries) {
    List<Map<String, Object>> include = []
    entries.each { Map<String, Object> entry ->
        List<Map<String, Object>> matrixEntries = entry.containsKey("entries")
                ? (entry["entries"] as List<Map<String, Object>>)
                : [entry]
        include.addAll(expandMatrixEntries(matrixEntries.collect { Map<String, Object> matrixEntry ->
            [
                    "coordinates": matrixEntry["coordinates"],
                    "versions"   : matrixEntry["versions"]
            ]
        }, "generateChangedTestedVersionsMatrix"))
    }
    include
}

// gradle generateMatrixMatchingCoordinates -Pcoordinates=<maven-coordinates>
Provider<Task> generateMatrixMatchingCoordinates = tasks.register("generateMatrixMatchingCoordinates", DefaultTask) { task ->
    task.setDescription("Returns matrix definition populated with all matching coordinates")
    task.setGroup(METADATA_GROUP)
    task.doFirst {
        def matrix = [
                "coordinates": matchingCoordinates
        ]
        matrix.putAll(matrixDefaultsFor("generateMatrixMatchingCoordinates"))
        writeGithubOutput("matrix", JsonOutput.toJson(matrix))
    }
}

// gradle generateMatrixBatchedCoordinates [-Pbatches=<n>]
Provider<Task> generateMatrixBatchedCoordinates = tasks.register("generateMatrixBatchedCoordinates", DefaultTask) { task ->
    task.setDescription("Returns matrix definition populated with fractional batch coordinates (k/n)")
    task.setGroup(METADATA_GROUP)
    task.doFirst {
        int batches = project.hasProperty("batches") ? Integer.parseInt(project.findProperty("batches").toString()) : 16
        if (batches <= 0) {
            throw new GradleException("Invalid 'batches' value: ${batches}")
        }
        def matrix = [
                "include": expandMatrixEntries(
                        (1..batches).collect { i -> ["coordinates": "${i}/${batches}"] },
                        "generateMatrixBatchedCoordinates"
                )
        ]
        writeGithubOutput("matrix", JsonOutput.toJson(matrix))
    }
}

// gradle generateChangedCoordinatesMatrix -PbaseCommit=<base-commit> -PnewCommit=<new-commit>
Provider<Task> generateChangedCoordinatesMatrix = tasks.register("generateChangedCoordinatesMatrix", DefaultTask) { task ->
    task.setDescription("Returns matrix definition populated with coordinates of changed libraries")
    task.setGroup(METADATA_GROUP)
    task.doFirst {
        if (!project.hasProperty("baseCommit")) {
            throw new GradleException("Missing 'baseCommit' property! Rerun Gradle with '-PbaseCommit=<commit-hash>'")
        }

        boolean noneFound = diffCoordinates.isEmpty()
        def matrix = [
                "include": noneFound
                        ? []
                        : expandMatrixEntries(
                                diffCoordinates.collect { coordinate -> ["coordinates": coordinate] },
                                "generateChangedCoordinatesMatrix"
                        )
        ]
        if (noneFound) {
            println "No changed coordinates were found!"
        }


        writeGithubOutput("matrix", JsonOutput.toJson(matrix))
        writeGithubOutput("none-found", noneFound.toString())
    }
}

// gradle generateChangedTestedVersionsMatrix -PbaseCommit=<base-commit> -PnewCommit=<new-commit>
Provider<Task> generateChangedTestedVersionsMatrix = tasks.register("generateChangedTestedVersionsMatrix", DefaultTask) { task ->
    task.setDescription("Returns matrix definition populated with artifact coordinates and newly added tested versions from changed metadata index files")
    task.setGroup(METADATA_GROUP)
    task.doFirst {
        if (!project.hasProperty("baseCommit")) {
            throw new GradleException("Missing 'baseCommit' property! Rerun Gradle with '-PbaseCommit=<commit-hash>'")
        }

        String base = project.property("baseCommit")
        String head = project.findProperty("newCommit") ?: "HEAD"
        List<Map<String, Object>> changedIndexEntries = tck.diffIndexTestedVersions(base, head)

        boolean noneFound = changedIndexEntries.isEmpty()
        List<Map<String, Object>> include = noneFound ? [] : expandChangedTestedVersionsMatrix(changedIndexEntries)
        def matrix = [include: include]
        if (noneFound) {
            println "No changed metadata index tested-version additions were found!"
        }

        writeGithubOutput("matrix", JsonOutput.toJson(matrix))
        writeGithubOutput("none-found", noneFound.toString())
    }
}

