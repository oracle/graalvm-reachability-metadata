plugins {
    id 'java-library'
}

group = 'org.graalvm'
version = '1.0.0-SNAPSHOT'

tasks.withType(JavaCompile).configureEach {
    options.release = 21
}

repositories {
    mavenCentral()
}

dependencies {
    // Provided at runtime by the consuming test module's classpath; needed only
    // to compile FullStackTraceTestExecutionListener.
    compileOnly 'org.assertj:assertj-core:3.22.0'
    compileOnly 'org.junit.platform:junit-platform-launcher:1.11.4'

    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}
