plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

repositories {
    exclusiveContent {
        forRepository {
            maven {
                url = uri('https://repo.maven.apache.org/maven2')
                metadataSources {
                    artifact()
                }
            }
        }
        filter {
            includeModule('jakarta.websocket', 'jakarta.websocket-client-api')
        }
    }
}

dependencies {
    testImplementation "jakarta.websocket:jakarta.websocket-client-api:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
