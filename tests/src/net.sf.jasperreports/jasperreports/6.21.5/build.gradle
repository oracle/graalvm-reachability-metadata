plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "net.sf.jasperreports:jasperreports:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    binaries {
        test {
            // The PDF exporter's built-in Type1 fonts default to the Cp1252 encoding,
            // which is not part of the default native-image charset set.
            buildArgs.add('-H:+AddAllCharsets')
        }
    }
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
