plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()
File nativeImageTempDir = layout.buildDirectory.dir("native-image-tmp").get().asFile
nativeImageTempDir.mkdirs()

dependencies {
    testImplementation "org.sonatype.plexus:plexus-sec-dispatcher:$libraryVersion"
    testImplementation 'org.codehaus.plexus:plexus-container-default:1.0-alpha-9-stable-1'
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

tasks.named("nativeTestCompile", org.graalvm.buildtools.gradle.tasks.BuildNativeImageTask).configure { task ->
    task.addEnvVar("TMPDIR=${nativeImageTempDir.absolutePath}")
    task.addEnvVar("TMP=${nativeImageTempDir.absolutePath}")
    task.addEnvVar("TEMP=${nativeImageTempDir.absolutePath}")
}

graalvmNative {
    binaries {
        all {
            buildArgs.add("-J-Djava.io.tmpdir=${nativeImageTempDir.absolutePath}")
        }
    }
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
