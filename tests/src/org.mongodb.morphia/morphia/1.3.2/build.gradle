plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()
Provider<String> nativeImageTempDirectory = providers.provider {
    File sharedMemoryRoot = file("/dev/shm")
    if (sharedMemoryRoot.isDirectory() && sharedMemoryRoot.canWrite()) {
        return new File(sharedMemoryRoot, "graalvm-reachability-metadata/org.mongodb.morphia/morphia/${libraryVersion}").absolutePath
    }
    return layout.buildDirectory.dir("native/nativeTestCompile/tmp").get().asFile.absolutePath
}

dependencies {
    testImplementation("org.mongodb.morphia:morphia:$libraryVersion") {
        exclude group: "cglib"
    }
    testImplementation 'cglib:cglib-nodep:2.2.2'
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

tasks.withType(Test).configureEach {
    jvmArgs "--add-opens=java.base/java.lang=ALL-UNNAMED"
}

tasks.named("nativeTestCompile") {
    doFirst {
        File tempDirectory = file(nativeImageTempDirectory.get())
        delete(tempDirectory)
        if (!tempDirectory.isDirectory() && !tempDirectory.mkdirs()) {
            throw new GradleException("Failed to create native-image temp directory: ${tempDirectory.absolutePath}")
        }
    }
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
    binaries {
        all {
            buildArgs.add("--add-opens=java.base/java.lang=ALL-UNNAMED")
            buildArgs.add("-H:TempDirectory=${nativeImageTempDirectory.get()}")
        }
    }
}
