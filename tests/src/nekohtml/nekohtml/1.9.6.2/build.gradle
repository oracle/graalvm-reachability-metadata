plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation("nekohtml:nekohtml:$libraryVersion") {
        exclude group: 'xerces', module: 'xercesImpl'
    }
    // Exercise HTMLTagBalancer's compatibility fallback for the legacy XNI startDocument signature.
    testImplementation 'xerces:xercesImpl:2.0.2'
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
