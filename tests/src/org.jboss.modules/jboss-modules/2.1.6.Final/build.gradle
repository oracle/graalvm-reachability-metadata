plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.jboss.modules:jboss-modules:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    binaries {
        test {
            buildArgs.add([
                '--initialize-at-build-time=org.jboss.modules.ModuleLoggerFinder',
                'org.jboss.modules.ModuleLoggerFinder$1',
                'org.jboss.modules.ModuleLoggerFinder$2',
                'org.jboss.modules.ModuleLoggerFinder$QueueingSystemLogger',
                'org.jboss.modules.ModuleLoggerFinder$DelegatingSystemLogger',
                'org.jboss.modules.ModuleLoggerFinder$SystemLogRecord'
            ].join(','))
        }
    }
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
