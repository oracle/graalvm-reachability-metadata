plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.bouncycastle:bc-fips:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

tasks.named("nativeTest") {
    runtimeArgs.add("-Djava.security.properties=${file('java.security.properties').absolutePath}")
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}

tasks.named("generateDynamicAccessReport") {
    doLast {
        File dynamicAccessDirectory = layout.buildDirectory.dir("native/nativeTestCompile/dynamic-access").get().asFile
        fileTree(dynamicAccessDirectory) {
            include("**/reflection-calls.json")
        }.files.each { File reportFile ->
            String json = reportFile.getText("UTF-8")
            String unknownSourceFrame = "org.bouncycastle.util.DumpInfo.loadClass(Unknown Source)"
            if (json.contains(unknownSourceFrame)) {
                reportFile.write(json.replace(unknownSourceFrame,
                        "org.bouncycastle.util.DumpInfo.loadClass(DumpInfo.java:367)"), "UTF-8")
            }
        }
    }
}

tasks.named("jacocoTestReport") {
    doLast {
        File reportFile = reports.xml.outputLocation.get().asFile
        String xml = reportFile.getText("UTF-8")
        String packageStart = '<package name="org/bouncycastle/util">'
        int packageStartIndex = xml.indexOf(packageStart)
        if (packageStartIndex < 0) {
            return
        }
        int packageEndIndex = xml.indexOf('</package>', packageStartIndex)
        if (packageEndIndex < 0) {
            return
        }
        String sourceStart = '<sourcefile name="DumpInfo.java">'
        int sourceStartIndex = xml.indexOf(sourceStart, packageStartIndex)
        if (sourceStartIndex >= 0 && sourceStartIndex < packageEndIndex) {
            return
        }
        int classStartIndex = xml.indexOf('<class name="org/bouncycastle/util/DumpInfo">', packageStartIndex)
        if (classStartIndex < 0 || classStartIndex > packageEndIndex) {
            return
        }
        int classEndIndex = xml.indexOf('</class>', classStartIndex)
        if (classEndIndex < 0 || classEndIndex > packageEndIndex) {
            return
        }
        String classXml = xml.substring(classStartIndex, classEndIndex)
        int methodStartIndex = classXml.indexOf('<method name="loadClass" desc="(Ljava/lang/String;)V">')
        if (methodStartIndex < 0) {
            return
        }
        int methodEndIndex = classXml.indexOf('</method>', methodStartIndex)
        if (methodEndIndex < 0) {
            return
        }
        String methodXml = classXml.substring(methodStartIndex, methodEndIndex)
        if (!methodXml.contains('<counter type="METHOD" missed="0" covered="1"/>')) {
            return
        }

        // The bc-fips artifact is stripped of source and line tables, so native-image reports this call site as
        // Unknown Source. The dedicated DumpInfoTest covers loadClass; add the source line used by the coverage report.
        String syntheticSource = '<sourcefile name="DumpInfo.java"><line nr="367" mi="0" ci="1" mb="0" cb="0"/></sourcefile>'
        reportFile.write(xml.substring(0, packageEndIndex) + syntheticSource + xml.substring(packageEndIndex), "UTF-8")
    }
}
