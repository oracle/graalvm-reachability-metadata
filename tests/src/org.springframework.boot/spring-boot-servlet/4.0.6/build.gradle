plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation platform("org.springframework.boot:spring-boot-dependencies:$libraryVersion")
    testImplementation "org.springframework.boot:spring-boot-servlet:$libraryVersion"
    testImplementation "org.springframework.boot:spring-boot-actuator:$libraryVersion"
    testImplementation 'jakarta.servlet:jakarta.servlet-api'
    testImplementation 'org.springframework:spring-test'
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
