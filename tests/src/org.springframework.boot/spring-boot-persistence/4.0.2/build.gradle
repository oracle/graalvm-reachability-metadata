plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()
File generatedTestResourcesDir = layout.buildDirectory.dir("generated/test-resources").get().asFile

sourceSets {
    test {
        resources.srcDir generatedTestResourcesDir
    }
}

tasks.register("generateNativeImageResourceConfig") {
    outputs.dir(generatedTestResourcesDir)
    doLast {
        File baseDir = new File(
                generatedTestResourcesDir,
                "META-INF/native-image/org.springframework.boot/spring-boot-persistence-tests")
        baseDir.mkdirs()
        new File(baseDir, "resource-config.json").text = """
                {
                  "resources": {
                    "includes": [
                      { "pattern": "org_springframework_boot/spring_boot_persistence/" },
                      { "pattern": "org_springframework_boot/spring_boot_persistence/.*" },
                      { "pattern": "org_springframework_boot/spring_boot_persistence/.*[.]class" }
                    ]
                  }
                }
                """.stripIndent()
        new File(baseDir, "reflect-config.json").text = """
                [
                  { "name": "org_springframework_boot.spring_boot_persistence.SampleAccount" },
                  { "name": "org_springframework_boot.spring_boot_persistence.SampleOrder" },
                  { "name": "org_springframework_boot.spring_boot_persistence.SampleInvoice" }
                ]
                """.stripIndent()
    }
}

tasks.named("processTestResources") {
    dependsOn("generateNativeImageResourceConfig")
}

dependencies {
    testImplementation "org.springframework.boot:spring-boot-persistence:$libraryVersion"
    testImplementation "org.springframework.boot:spring-boot-autoconfigure:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
