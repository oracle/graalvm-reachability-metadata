plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.apache.poi:poi:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testImplementation 'org.bouncycastle:bcpkix-jdk18on:1.77'
    testImplementation 'xerces:xercesImpl:2.12.2'
    testCompileOnly("org.graalvm.nativeimage:graal-hotspot-library:22.0.0")
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
    binaries {
        test {
            buildArgs.add('-H:+AddAllCharsets')
            buildArgs.add('-H:IncludeResources=org/apache/poi/ss/formula/function/.*')
        }
    }
}
