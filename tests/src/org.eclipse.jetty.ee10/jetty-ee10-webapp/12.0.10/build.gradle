plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()
File nativeImageTemporaryDirectory = new File(
        "/dev/shm",
        "jetty-ee10-webapp-native-image-tmp-${Integer.toHexString(project.projectDir.absolutePath.hashCode())}"
)
nativeImageTemporaryDirectory.mkdirs()

dependencies {
    testImplementation "org.eclipse.jetty.ee10:jetty-ee10-webapp:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    binaries {
        test {
            environmentVariables.put("TMPDIR", nativeImageTemporaryDirectory.absolutePath)
            jvmArgs.add("-Djava.io.tmpdir=${nativeImageTemporaryDirectory.absolutePath}")
        }
    }
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
