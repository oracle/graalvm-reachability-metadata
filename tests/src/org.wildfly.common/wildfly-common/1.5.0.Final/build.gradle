plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.wildfly.common:wildfly-common:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testImplementation('org.graalvm.compiler:compiler:1.0.0-rc9') {
        transitive = false
    }
    testImplementation 'org.jboss.logging:jboss-logging:3.3.1.Final'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
