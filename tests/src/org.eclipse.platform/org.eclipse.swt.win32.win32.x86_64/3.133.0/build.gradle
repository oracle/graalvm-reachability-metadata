@CacheableTransform
abstract class StripJarSignaturesTransform implements TransformAction<TransformParameters.None> {
    @InputArtifact
    @PathSensitive(PathSensitivity.NAME_ONLY)
    abstract Provider<FileSystemLocation> getInputArtifact()

    @Override
    void transform(TransformOutputs outputs) {
        File inputFile = inputArtifact.get().asFile
        File outputFile = outputs.file(inputFile.name)
        new JarFile(inputFile).withCloseable { JarFile jarFile ->
            outputFile.withOutputStream { OutputStream outputStream ->
                ZipOutputStream zipOutputStream = new ZipOutputStream(outputStream)
                try {
                    jarFile.entries().each { JarEntry entry ->
                        if (!StripJarSignaturesTransform.isJarSignatureEntry(entry.name)) {
                            StripJarSignaturesTransform.copyEntry(jarFile, entry, zipOutputStream)
                        }
                    }
                } finally {
                    zipOutputStream.close()
                }
            }
        }
    }

    private static void copyEntry(JarFile jarFile, JarEntry entry, ZipOutputStream zipOutputStream) {
        ZipEntry outputEntry = new ZipEntry(entry.name)
        outputEntry.time = entry.time
        outputEntry.comment = entry.comment
        outputEntry.extra = entry.extra
        if (entry.method == ZipEntry.STORED) {
            outputEntry.method = ZipEntry.STORED
            outputEntry.size = entry.size
            outputEntry.compressedSize = entry.compressedSize
            outputEntry.crc = entry.crc
        }
        zipOutputStream.putNextEntry(outputEntry)
        if (!entry.isDirectory()) {
            jarFile.getInputStream(entry).withCloseable { InputStream inputStream ->
                inputStream.transferTo(zipOutputStream)
            }
        }
        zipOutputStream.closeEntry()
    }

    private static boolean isJarSignatureEntry(String entryName) {
        return entryName.startsWith("META-INF/") &&
                (entryName.endsWith(".SF") || entryName.endsWith(".RSA") || entryName.endsWith(".DSA"))
    }
}

plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()
String unsignedJarType = "unsigned-jar"

dependencies {
    registerTransform(StripJarSignaturesTransform) {
        from.attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, ArtifactTypeDefinition.JAR_TYPE)
        to.attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, unsignedJarType)
    }
}

dependencies {
    testImplementation "org.eclipse.platform:org.eclipse.swt.win32.win32.x86_64:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}

tasks.named("nativeTestCompile", BuildNativeImageTask).configure { BuildNativeImageTask task ->
    FileCollection transformedRuntimeClasspath = configurations.testRuntimeClasspath.incoming.artifactView { view ->
        view.attributes.attribute(ArtifactTypeDefinition.ARTIFACT_TYPE_ATTRIBUTE, unsignedJarType)
    }.files
    FileCollection originalNativeImageClasspath = objects.fileCollection().from(task.options.get().classpath)
    task.options.get().classpath.setFrom(transformedRuntimeClasspath, originalNativeImageClasspath)
}
