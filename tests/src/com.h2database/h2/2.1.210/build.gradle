plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()
String upgradeLegacyVersion = "1.4.200"

configurations {
    upgradeLegacyH2
}

dependencies {
	testImplementation("com.h2database:h2:$libraryVersion")
	testImplementation("com.ibm.icu:icu4j:73.2")
	testImplementation("org.assertj:assertj-core:3.22.0")
    upgradeLegacyH2("com.h2database:h2:$upgradeLegacyVersion")
}

String upgradeLegacyH2Jar = configurations.upgradeLegacyH2.singleFile.absolutePath

tasks.named("test") {
    jvmArgs "--add-opens=java.base/java.nio=ALL-UNNAMED"
    systemProperty "h2.nioCleanerHack", "true"
    systemProperty "h2.upgrade.oldJar", upgradeLegacyH2Jar
}

graalvmNative {
    binaries {
        test {
            buildArgs("-H:+AllowJRTFileSystem")
        }
    }
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
        metadataCopy {
            mergeWithExisting = true
            inputTaskNames.add("test")
            outputDirectories.add("src/test/resources/META-INF/native-image/com.h2database/h2")
        }
    }
}

tasks.named("nativeTest") {
    runtimeArgs.add("-Djava.home=${System.getenv('JAVA_HOME')}")
    runtimeArgs.add("-Djava.class.path=${sourceSets.test.runtimeClasspath.asPath}")
    runtimeArgs.add("-Dh2.nioCleanerHack=true")
    runtimeArgs.add("-Dh2.upgrade.oldJar=$upgradeLegacyH2Jar")
}
