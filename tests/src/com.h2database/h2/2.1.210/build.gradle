plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

configurations {
    legacyH2 {
        canBeConsumed = false
        canBeResolved = true
    }
}

Closure<List<File>> resolveRuntimeClassLoadingEntries = {
    Set<File> entries = new LinkedHashSet<File>()
    entries.addAll(sourceSets.test.output.files.findAll { it.exists() })
    entries.addAll(configurations.testRuntimeClasspath.resolvedConfiguration.resolvedArtifacts.findAll { artifact ->
        artifact.moduleVersion.id.group == "com.h2database" && artifact.moduleVersion.id.name == "h2"
    }.collect { artifact ->
        artifact.file
    })
    return entries.toList().sort { File file -> file.absolutePath }
}

dependencies {
    testImplementation("com.h2database:h2:$libraryVersion")
    testImplementation("com.ibm.icu:icu4j:71.1")
    testImplementation("org.assertj:assertj-core:3.22.0")
    testImplementation("org.slf4j:slf4j-simple:1.7.36")
    legacyH2("com.h2database:h2:1.4.200")
}

tasks.named("processTestResources") {
    from(configurations.legacyH2) {
        into("h2-upgrade")
        rename { "legacy-h2.jar" }
    }
}

tasks.withType(Test).configureEach {
    systemProperty("h2.javaObjectSerializer", "h2.JdbcUtilsTest")
    systemProperty("h2.nioCleanerHack", "true")
    systemProperty("h2.useThreadContextClassLoader", "true")
    jvmArgs(
            "--add-opens", "java.base/java.nio=ALL-UNNAMED",
            "--add-opens", "java.base/jdk.internal.ref=ALL-UNNAMED")
}

graalvmNative {
    binaries {
        all {
            buildArgs.add('-H:+RuntimeClassLoading')
            buildArgs.add('-H:Preserve=package=java.lang')
            buildArgs.add('-H:Preserve=package=java.lang.invoke')
            buildArgs.add('-H:Preserve=module=java.sql')
            buildArgs.add('-H:Preserve=package=jdk.internal.access')
            buildArgs.add('-H:Preserve=package=jdk.internal.misc')
            buildArgs.add('--initialize-at-run-time=org.h2.engine.SysProperties')
            buildArgs.add('--initialize-at-run-time=org.h2.util.MemoryUnmapper')
            buildArgs.addAll(providers.provider {
                org.graalvm.internal.tck.utils.DynamicAccessUtils
                        .buildArgsForClasspathEntries(resolveRuntimeClassLoadingEntries())
            })
        }
        test {
            buildArgs("-H:+AllowJRTFileSystem")
            runtimeArgs("-Dh2.javaObjectSerializer=h2.JdbcUtilsTest")
            runtimeArgs("-Dh2.nioCleanerHack=true")
            runtimeArgs("-Dh2.useThreadContextClassLoader=true")
            runtimeArgs("-Djava.home=${System.getenv('JAVA_HOME')}")
            runtimeArgs("-Djava.class.path=${sourceSets.test.runtimeClasspath.asPath}")
        }
    }
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
        metadataCopy {
            mergeWithExisting = true
            inputTaskNames.add("test")
            outputDirectories.add("src/test/resources/META-INF/native-image/com.h2database/h2")
        }
    }
}
