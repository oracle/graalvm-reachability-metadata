plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.springframework.cloud:spring-cloud-circuitbreaker-resilience4j:$libraryVersion"
    testImplementation 'io.github.resilience4j:resilience4j-bulkhead:2.3.0'
    testImplementation 'io.github.resilience4j:resilience4j-reactor:2.3.0'
    testImplementation 'io.projectreactor:reactor-core:3.8.2'
    testImplementation 'org.springframework:spring-core:7.0.2'
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
