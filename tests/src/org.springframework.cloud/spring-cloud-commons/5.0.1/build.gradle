plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.springframework.cloud:spring-cloud-commons:$libraryVersion"
    testImplementation 'org.springframework.boot:spring-boot:4.0.2'
    testImplementation 'org.springframework:spring-webflux:7.0.2'
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
