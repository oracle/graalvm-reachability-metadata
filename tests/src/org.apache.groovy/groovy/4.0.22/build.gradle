plugins {
    id "org.graalvm.internal.tck"
    id "groovy"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.apache.groovy:groovy:$libraryVersion"
    testImplementation localGroovy()
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.withType(org.gradle.api.tasks.compile.GroovyCompile).configureEach {
    groovyOptions.optimizationOptions.put("indy", false)
}

tasks.named("test") {
    systemProperty "groovy.target.indy", "false"
}

graalvmNative {
    binaries {
        test {
            runtimeArgs("-Dgroovy.target.indy=false")
        }
    }
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
