plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.springframework.data:spring-data-commons:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testImplementation "org.springframework:spring-context:5.3.31"
    testImplementation "org.springframework:spring-tx:5.3.31"
    testImplementation "io.projectreactor:reactor-core:3.4.34"
    testImplementation "org.jetbrains.kotlin:kotlin-reflect:1.6.21"
    testImplementation "org.jetbrains.kotlin:kotlin-stdlib:1.6.21"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.6.4"
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-reactive:1.6.4"
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
