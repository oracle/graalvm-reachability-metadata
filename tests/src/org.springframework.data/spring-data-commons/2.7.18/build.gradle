plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.springframework.data:spring-data-commons:$libraryVersion"
    testImplementation 'org.springframework:spring-aop:5.3.31'
    testImplementation 'org.springframework:spring-expression:5.3.31'
    testImplementation 'aopalliance:aopalliance:1.0'
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

tasks.withType(Test).configureEach {
    jvmArgs "--add-opens=java.base/java.lang.invoke=ALL-UNNAMED"
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
    binaries {
        all {
            buildArgs.add("--add-opens=java.base/java.lang.invoke=ALL-UNNAMED")
        }
    }
}
