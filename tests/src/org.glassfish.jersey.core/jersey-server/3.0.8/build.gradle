plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.glassfish.jersey.core:jersey-server:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testImplementation "org.glassfish.jersey.inject:jersey-hk2:3.0.8"
    testImplementation "org.jboss:jboss-vfs:3.2.6.Final"
    testImplementation "jakarta.xml.bind:jakarta.xml.bind-api:3.0.1"
    testImplementation "org.glassfish.jaxb:jaxb-runtime:3.0.2"
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
