plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.osgi:org.osgi.core:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    binaries {
        all {
            buildArgs.add('--initialize-at-run-time=org.osgi.framework.AdaptPermissionCollection,org.osgi.framework.BundlePermissionCollection,org.osgi.framework.PackagePermissionCollection,org.osgi.framework.ServicePermissionCollection')
            buildArgs.add('--initialize-at-build-time=org.osgi.framework.CapabilityPermissionCollection')
        }
    }
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
