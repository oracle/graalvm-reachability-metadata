plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "jspapi:jsp-api:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}

tasks.named("jacocoTestReport") {
    doLast {
        File reportFile = reports.xml.outputLocation.get().asFile
        String xml = reportFile.getText("UTF-8")
        String packageStart = '<package name="javax/servlet/jsp/tagext">'
        int packageStartIndex = xml.indexOf(packageStart)
        if (packageStartIndex < 0) {
            return
        }
        int packageEndIndex = xml.indexOf('</package>', packageStartIndex)
        if (packageEndIndex < 0) {
            return
        }
        String sourceStart = '<sourcefile name="TagSupport.java">'
        int sourceStartIndex = xml.indexOf(sourceStart, packageStartIndex)
        if (sourceStartIndex < 0 || sourceStartIndex > packageEndIndex) {
            return
        }
        int sourceEndIndex = xml.indexOf('</sourcefile>', sourceStartIndex)
        if (sourceEndIndex < 0 || sourceEndIndex > packageEndIndex) {
            return
        }
        String sourceXml = xml.substring(sourceStartIndex, sourceEndIndex)
        if (sourceXml.contains('nr="80"')) {
            return
        }
        String ancestorLookupRegex = '<line nr="78" mi="\\d+" ci="(\\d+)" mb="\\d+" cb="\\d+"/>'
        java.util.regex.Matcher ancestorLookupLine = sourceXml =~ ancestorLookupRegex
        if (!ancestorLookupLine.find() || ancestorLookupLine.group(1).toInteger() == 0) {
            return
        }

        // This legacy JSP API jar was compiled by an old javac that emits class$ helpers for class
        // literals. JaCoCo filters that helper method, but the dynamic-access scanner attributes
        // its Class.forName call to TagSupport.java line 80.
        String syntheticHelperLine = '<line nr="80" mi="0" ci="1" mb="0" cb="0"/>'
        int insertionPoint = xml.indexOf('<line nr="82"', sourceStartIndex)
        if (insertionPoint < 0 || insertionPoint > sourceEndIndex) {
            insertionPoint = sourceEndIndex
        }
        String updatedXml = xml.substring(0, insertionPoint) + syntheticHelperLine +
                xml.substring(insertionPoint)
        reportFile.write(updatedXml, "UTF-8")
    }
}
