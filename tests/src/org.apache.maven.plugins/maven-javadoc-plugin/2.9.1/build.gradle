plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.apache.maven.plugins:maven-javadoc-plugin:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testImplementation "org.apache.maven.plugin-testing:maven-plugin-testing-harness:1.2"
    testImplementation "cn.pivoto.jdk:tools:1.8"
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
