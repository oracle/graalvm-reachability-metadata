plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()
String cglibDebugLocation = layout.buildDirectory.dir("cglib-debug").get().asFile.absolutePath

dependencies {
    testImplementation "org.springframework:spring-core:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testImplementation 'net.bytebuddy:byte-buddy-agent:1.14.19'
}

tasks.withType(Test).configureEach {
    systemProperty "cglib.debugLocation", cglibDebugLocation
    jvmArgs += [
        "--add-opens=java.base/java.lang=ALL-UNNAMED",
        "--add-opens=java.base/java.io=ALL-UNNAMED"
    ]
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
    binaries {
        test {
            runtimeArgs("-Dcglib.debugLocation=${cglibDebugLocation}")
        }
        all {
            buildArgs.addAll([
                "--add-opens=java.base/java.io=ALL-UNNAMED"
            ])
        }
    }
}
