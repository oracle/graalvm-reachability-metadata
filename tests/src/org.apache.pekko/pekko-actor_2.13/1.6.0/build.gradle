plugins {
    id "org.graalvm.internal.tck"
    id "scala"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.apache.pekko:pekko-actor_2.13:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testImplementation 'org.scala-lang:scala-library:2.13.16'
    testImplementation 'org.scala-lang:scala-compiler:2.13.16'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

def sunReflectPatchDir = layout.buildDirectory.dir('sun-reflect-patch')

// The Reflect test provides the legacy sun.reflect.Reflection API via the owning JDK module.
tasks.register('prepareSunReflectPatch', Copy) {
    dependsOn tasks.named('compileTestScala')
    from(layout.buildDirectory.dir('classes/scala/test/sun/reflect'))
    into(sunReflectPatchDir.map { it.dir('sun/reflect') })
}

tasks.withType(Test).configureEach {
    dependsOn tasks.named('prepareSunReflectPatch')
    jvmArgs '--add-opens=java.base/java.lang=ALL-UNNAMED',
            '--add-opens=java.base/jdk.internal.misc=ALL-UNNAMED',
            "--patch-module=jdk.unsupported=${sunReflectPatchDir.get().asFile.absolutePath}"
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
    binaries {
        all {
            buildArgs.add('--add-opens=java.base/java.lang=ALL-UNNAMED')
            buildArgs.add('--add-opens=java.base/jdk.internal.misc=ALL-UNNAMED')
        }
    }
}
