plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "io.opentelemetry.instrumentation:opentelemetry-grpc-1.6:$libraryVersion"
    testImplementation 'io.grpc:grpc-inprocess:1.60.0'
    testImplementation 'io.grpc:grpc-stub:1.60.0'
    testImplementation 'io.opentelemetry:opentelemetry-sdk:1.35.0'
    testImplementation 'io.opentelemetry:opentelemetry-sdk-testing:1.35.0'
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
