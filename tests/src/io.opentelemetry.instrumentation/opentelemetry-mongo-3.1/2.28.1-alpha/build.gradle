plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "io.opentelemetry.instrumentation:opentelemetry-mongo-3.1:$libraryVersion"
    testImplementation "io.opentelemetry:opentelemetry-sdk:1.62.0"
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testImplementation "org.mongodb:mongodb-driver-core:3.1.0"
    testImplementation "org.mongodb:bson:3.12.14"
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
