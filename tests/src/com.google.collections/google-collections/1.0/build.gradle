plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

sourceSets {
    testSystemClassLoader
}

dependencies {
    testImplementation "com.google.collections:google-collections:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testImplementation sourceSets.testSystemClassLoader.output
}

tasks.withType(Test).configureEach {
    dependsOn(tasks.named("compileTestSystemClassLoaderJava"))
    jvmArgs += [
        "--add-opens=java.base/java.lang=ALL-UNNAMED",
        '-Djava.system.class.loader=com_google_collections.google_collections.FinalizerHidingSystemClassLoader'
    ]
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
    binaries {
        all {
            buildArgs.addAll([
                '--add-opens=java.base/java.lang=ALL-UNNAMED'
            ])
        }
    }
}
