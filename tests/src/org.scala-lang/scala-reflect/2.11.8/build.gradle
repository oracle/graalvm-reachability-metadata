plugins {
    id "org.graalvm.internal.tck"
    id "scala"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.scala-lang:scala-reflect:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testImplementation 'org.scala-lang:scala-library:2.13.16'
    testImplementation 'org.scala-lang:scala-compiler:2.13.16'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.withType(Test).configureEach {
    jvmArgs += ["--add-opens=java.base/java.lang=ALL-UNNAMED"]
}

tasks.withType(org.gradle.testing.jacoco.tasks.JacocoReport).configureEach {
    // ChromeTrace's PID initializer is synthetic in Scala bytecode, so include only the targeted line shim.
    additionalClassDirs.from(fileTree(layout.buildDirectory.dir("classes/scala/test").get().asFile) {
        include "scala/reflect/internal/util/ChromeTraceCoverageShim*.class"
    })
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
    binaries {
        all {
            buildArgs.addAll(['--add-opens=java.base/java.lang=ALL-UNNAMED'])
        }
    }
}
