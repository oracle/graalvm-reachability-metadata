plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.apache.tomcat.embed:tomcat-embed-el:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

jar {
    from sourceSets.test.output
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
    binaries {
        test {
            // Keep Tomcat's bundled provider from shadowing the test service entry in native ServiceLoader discovery.
            buildArgs.add('-H:ServiceLoaderFeatureExcludeServiceProviders=org.apache.el.ExpressionFactoryImpl')
        }
    }
}
