plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()
String javaHome = System.getenv('JAVA_HOME')
def testRuntimeClasspathArg = "-Djava.class.path=${-> sourceSets.test.runtimeClasspath.asPath}"

dependencies {
    testImplementation "org.jgroups:jgroups:$libraryVersion"
    testImplementation 'org.slf4j:slf4j-api:1.7.31'
    testImplementation('org.wildfly.openssl:wildfly-openssl-java:2.3.0.Final') {
        transitive = false
    }
    testRuntimeOnly('org.wildfly.openssl:wildfly-openssl-linux-x86_64:2.3.0.Final') {
        transitive = false
    }
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testRuntimeOnly 'com.h2database:h2:2.3.230'
}

tasks.withType(Test).configureEach {
    systemProperty "jgroups.use.jdk_logger", "true"
}

tasks.named("nativeTest") {
    runtimeArgs.add("-Djava.home=${javaHome}")
    runtimeArgs.add(testRuntimeClasspathArg)
}

graalvmNative {
    binaries {
        test {
            runtimeArgs("-Djava.home=${javaHome}")
            runtimeArgs(testRuntimeClasspathArg)
        }
    }
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
