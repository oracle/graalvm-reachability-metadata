Closure<Void> writeGeneratedDirectAccessClass = { String path, String content ->
    File outputFile = generatedDirectAccessClasses.get().file(path).asFile
    outputFile.parentFile.mkdirs()
    outputFile.bytes = Base64.decoder.decode(content)
    null
}

Closure<Integer> readU2 = { byte[] bytes, int offset ->
    ((bytes[offset] & 0xFF) << 8) | (bytes[offset + 1] & 0xFF)
}

Closure<Integer> readU4 = { byte[] bytes, int offset ->
    ((bytes[offset] & 0xFF) << 24) | ((bytes[offset + 1] & 0xFF) << 16) |
            ((bytes[offset + 2] & 0xFF) << 8) | (bytes[offset + 3] & 0xFF)
}

Closure<Void> writeU2 = { byte[] bytes, int offset, int value ->
    bytes[offset] = (byte) ((value >>> 8) & 0xFF)
    bytes[offset + 1] = (byte) (value & 0xFF)
    null
}

Closure<Void> writeU4 = { byte[] bytes, int offset, int value ->
    bytes[offset] = (byte) ((value >>> 24) & 0xFF)
    bytes[offset + 1] = (byte) ((value >>> 16) & 0xFF)
    bytes[offset + 2] = (byte) ((value >>> 8) & 0xFF)
    bytes[offset + 3] = (byte) (value & 0xFF)
    null
}

Closure<byte[]> insertBytes = { byte[] bytes, int offset, byte[] insertedBytes ->
    byte[] result = new byte[bytes.length + insertedBytes.length]
    System.arraycopy(bytes, 0, result, 0, offset)
    System.arraycopy(insertedBytes, 0, result, offset, insertedBytes.length)
    System.arraycopy(bytes, offset, result, offset + insertedBytes.length, bytes.length - offset)
    result
}

Closure<Void> writePatchedClassResolverClass = { String classEntryName, boolean addClassResolverLineNumber = false ->
    File restAssuredJar = configurations.testRuntimeClasspath.files.find { File file ->
        file.name == "rest-assured-${libraryVersion}.jar"
    }
    if (restAssuredJar == null) {
        throw new GradleException("Could not find rest-assured runtime JAR for ${libraryVersion}")
    }

    byte[] bytes
    new ZipFile(restAssuredJar).withCloseable { ZipFile zipFile ->
        bytes = zipFile.getInputStream(zipFile.getEntry(classEntryName)).bytes
    }

    String[] constantPool = new String[readU2(bytes, 8)]
    int lineNumberTableNameIndex = -1
    int position = 10
    int index = 1
    while (index < constantPool.length) {
        int tag = bytes[position++] & 0xFF
        switch (tag) {
            case 1:
                int length = readU2(bytes, position)
                position += 2
                constantPool[index] = new String(bytes, position, length, StandardCharsets.UTF_8)
                if (constantPool[index] == 'LineNumberTable') {
                    lineNumberTableNameIndex = index
                }
                position += length
                break
            case 3:
            case 4:
                position += 4
                break
            case 5:
            case 6:
                position += 8
                index++
                break
            case 7:
            case 8:
            case 16:
                position += 2
                break
            case 9:
            case 10:
            case 11:
            case 12:
            case 18:
                position += 4
                break
            case 15:
                position += 3
                break
            default:
                throw new GradleException("Unsupported class file constant pool tag ${tag}")
        }
        index++
    }

    position += 6
    int interfacesCount = readU2(bytes, position)
    position += 2 + 2 * interfacesCount
    int fieldsCount = readU2(bytes, position)
    position += 2
    for (int fieldIndex = 0; fieldIndex < fieldsCount; fieldIndex++) {
        position += 6
        int attributesCount = readU2(bytes, position)
        position += 2
        for (int attributeIndex = 0; attributeIndex < attributesCount; attributeIndex++) {
            position += 2
            position += 4 + readU4(bytes, position)
        }
    }

    if (addClassResolverLineNumber && lineNumberTableNameIndex == -1) {
        throw new GradleException("Could not find LineNumberTable constant in ${classEntryName}")
    }

    int patchedMethods = 0
    Integer classResolverCodeAttributeLengthPosition = null
    Integer classResolverCodeAttributesCountPosition = null
    Integer classResolverLineNumberInsertPosition = null
    int methodsCount = readU2(bytes, position)
    position += 2
    for (int methodIndex = 0; methodIndex < methodsCount; methodIndex++) {
        int accessFlagsPosition = position
        int accessFlags = readU2(bytes, position)
        int nameIndex = readU2(bytes, position + 2)
        int descriptorIndex = readU2(bytes, position + 4)
        int attributesCount = readU2(bytes, position + 6)
        position += 8
        boolean classResolverMethod = constantPool[nameIndex] == 'class$' &&
                constantPool[descriptorIndex] == '(Ljava/lang/String;)Ljava/lang/Class;'
        if (classResolverMethod) {
            writeU2(bytes, accessFlagsPosition, accessFlags & ~0x1000)
            patchedMethods++
        }
        for (int attributeIndex = 0; attributeIndex < attributesCount; attributeIndex++) {
            int attributePosition = position
            int attributeNameIndex = readU2(bytes, attributePosition)
            int attributeLength = readU4(bytes, attributePosition + 2)
            if (classResolverMethod && addClassResolverLineNumber && constantPool[attributeNameIndex] == 'Code') {
                int codePosition = attributePosition + 6
                int codeLength = readU4(bytes, codePosition + 4)
                int exceptionTableLengthPosition = codePosition + 8 + codeLength
                int exceptionTableLength = readU2(bytes, exceptionTableLengthPosition)
                int codeAttributesCountPosition = exceptionTableLengthPosition + 2 + 8 * exceptionTableLength
                int codeAttributesCount = readU2(bytes, codeAttributesCountPosition)
                int nestedAttributePosition = codeAttributesCountPosition + 2
                boolean hasLineNumberTable = false
                for (int codeAttributeIndex = 0; codeAttributeIndex < codeAttributesCount; codeAttributeIndex++) {
                    int codeAttributeNameIndex = readU2(bytes, nestedAttributePosition)
                    int codeAttributeLength = readU4(bytes, nestedAttributePosition + 2)
                    if (constantPool[codeAttributeNameIndex] == 'LineNumberTable') {
                        hasLineNumberTable = true
                    }
                    nestedAttributePosition += 6 + codeAttributeLength
                }
                if (!hasLineNumberTable) {
                    classResolverCodeAttributeLengthPosition = attributePosition + 2
                    classResolverCodeAttributesCountPosition = codeAttributesCountPosition
                    classResolverLineNumberInsertPosition = attributePosition + 6 + attributeLength
                }
            }
            position += 6 + attributeLength
        }
    }
    if (addClassResolverLineNumber && classResolverLineNumberInsertPosition != null) {
        byte[] lineNumberAttribute = new byte[12]
        writeU2(lineNumberAttribute, 0, lineNumberTableNameIndex)
        writeU4(lineNumberAttribute, 2, 6)
        writeU2(lineNumberAttribute, 6, 1)
        writeU2(lineNumberAttribute, 8, 0)
        writeU2(lineNumberAttribute, 10, 1)
        writeU4(bytes, classResolverCodeAttributeLengthPosition,
                readU4(bytes, classResolverCodeAttributeLengthPosition) + lineNumberAttribute.length)
        writeU2(bytes, classResolverCodeAttributesCountPosition,
                readU2(bytes, classResolverCodeAttributesCountPosition) + 1)
        bytes = insertBytes(bytes, classResolverLineNumberInsertPosition, lineNumberAttribute)
    }
    if (patchedMethods != 1) {
        throw new GradleException(
                "Expected to patch one ${classEntryName} class resolver but patched ${patchedMethods}")
    }

    File outputFile = generatedDirectAccessClasses.get().file(classEntryName).asFile
    outputFile.parentFile.mkdirs()
    outputFile.bytes = bytes
    null
}

