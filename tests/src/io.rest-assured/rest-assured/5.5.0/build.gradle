TaskProvider<Task> generateGroovyDgmReachabilitySource = tasks.register("generateGroovyDgmReachabilitySource") {
    outputs.dir(generatedNativeReachabilitySources)
    outputs.dir(generatedNativeReachabilityConfig)

    doLast {
        File groovyJar = configurations.testCompileClasspath.files.find { File file ->
            file.name == "groovy-4.0.22.jar"
        }
        if (groovyJar == null) {
            groovyJar = configurations.testRuntimeClasspath.files.find { File file ->
                file.name == "groovy-4.0.22.jar"
            }
        }
        if (groovyJar == null) {
            throw new GradleException("Could not find Groovy runtime JAR for ${libraryVersion}")
        }

        List<String> dgmClasses
        new ZipFile(groovyJar).withCloseable { ZipFile zipFile ->
            dgmClasses = Collections.list(zipFile.entries())
                    .findAll { ZipEntry entry ->
                        entry.name ==~ /org\/codehaus\/groovy\/runtime\/dgm\$\d+\.class/
                    }
                    .collect { ZipEntry entry ->
                        entry.name.replace('/', '.').replace('.class', '')
                    }
                    .sort { String left, String right ->
                        Integer.compare(
                                Integer.parseInt(left.substring(left.lastIndexOf('$') + 1)),
                                Integer.parseInt(right.substring(right.lastIndexOf('$') + 1)))
                    }
        }

        String classLiterals = dgmClasses.collect { String className ->
            "            ${className}.class"
        }.join(",\n")
        String source = """/*
 * Copyright and related rights waived via CC0
 *
 * You should have received a copy of the CC0 legalcode along with this
 * work. If not, see <http://creativecommons.org/publicdomain/zero/1.0/>.
 */
package io_rest_assured.rest_assured;

import static org.junit.jupiter.api.Assertions.assertTrue;

import org.junit.jupiter.api.Test;

public class GroovyDgmReachabilityTest {
    private static final Class<?>[] DGM_CLASSES = {
${classLiterals}
    };

    @Test
    void keepsGroovyGeneratedMetaMethodsReachableForNativeImage() {
        assertTrue(DGM_CLASSES.length > 1000);
    }
}
"""

        File outputFile = generatedNativeReachabilitySources.get()
                .file("io_rest_assured/rest_assured/GroovyDgmReachabilityTest.java")
                .asFile
        outputFile.parentFile.mkdirs()
        outputFile.setText(source, StandardCharsets.UTF_8.name())

        List<String> constructorReachabilityTypes = [
                "java.util.ArrayList",
                "java.util.LinkedHashMap",
                "io.restassured.authentication.NoAuthScheme",
                "io.restassured.http.Headers",
                "io.restassured.http.Cookies",
                "io.restassured.internal.support.ParameterUpdater"
        ]
        String reflectConfig = (constructorReachabilityTypes + dgmClasses).collect { String className ->
            """  {
    "name": "${className}",
    "allPublicConstructors": true
  }"""
        }.join(",\n")
        File reflectConfigFile = generatedNativeReachabilityConfig.get()
                .file("reflect-config.json")
                .asFile
        reflectConfigFile.parentFile.mkdirs()
        reflectConfigFile.setText("""[
${reflectConfig}
]
""", StandardCharsets.UTF_8.name())
    }
}

sourceSets {
    test {
        java.srcDir(generatedNativeReachabilitySources)
        output.dir(generatedDirectAccessClasses, builtBy: generateDirectAccessClass)
    }
}

Closure<Void> patchEffectiveJacocoClass = { String classEntryName ->
    String effectiveJarDirectoryName = "rest_assured_${libraryVersion.replaceAll('[^A-Za-z0-9]', '_')}_jar"
    File sourceFile = generatedDirectAccessClasses.get().file(classEntryName).asFile
    File effectiveFile = layout.buildDirectory
            .file("jacoco/effective/${effectiveJarDirectoryName}/${classEntryName}")
            .get()
            .asFile
    if (sourceFile.exists()) {
        effectiveFile.parentFile.mkdirs()
        effectiveFile.bytes = sourceFile.bytes
    }
    null
}

