plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.jetbrains.kotlin:kotlin-stdlib-common:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
    binaries {
        test {
            buildArgs.add('-H:IncludeResources=META-INF/MANIFEST\\.MF|META-INF/kotlin-stdlib-common\\.kotlin_module|kotlin/.*\\.kotlin_metadata')
        }
    }
}
