plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

repositories {
    exclusiveContent {
        forRepository {
            mavenCentral {
                metadataSources {
                    artifact()
                }
            }
        }
        filter {
            includeGroup "jakarta.servlet.jsp.jstl"
        }
    }
}

dependencies {
    testImplementation "jakarta.servlet.jsp.jstl:jakarta.servlet.jsp.jstl-api:$libraryVersion@jar"
    testImplementation 'jakarta.el:jakarta.el-api:5.0.1'
    testImplementation 'jakarta.servlet:jakarta.servlet-api:6.0.0'
    testImplementation 'jakarta.servlet.jsp:jakarta.servlet.jsp-api:3.1.0'
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    binaries {
        test {
            buildArgs("-H:+AllowJRTFileSystem")
            runtimeArgs("-Djava.home=${System.getenv('JAVA_HOME')}")
            runtimeArgs("-Djava.class.path=${sourceSets.test.runtimeClasspath.asPath}")
        }
    }
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
