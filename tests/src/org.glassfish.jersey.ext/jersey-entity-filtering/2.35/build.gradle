plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.glassfish.jersey.ext:jersey-entity-filtering:$libraryVersion"
    testImplementation "org.glassfish.jersey.core:jersey-server:$libraryVersion"
    testImplementation "org.glassfish.jersey.inject:jersey-hk2:$libraryVersion"
    testImplementation 'javax.annotation:javax.annotation-api:1.3.2'
    testImplementation 'javax.xml.bind:jaxb-api:2.3.1'
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
