plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "io.opentelemetry.contrib:opentelemetry-baggage-processor:$libraryVersion"
    testImplementation 'io.opentelemetry:opentelemetry-api-incubator:1.62.0-alpha'
    testImplementation 'io.opentelemetry:opentelemetry-sdk-extension-autoconfigure-spi:1.62.0'
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
