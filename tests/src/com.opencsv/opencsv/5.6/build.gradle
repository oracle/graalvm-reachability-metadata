plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()
String localeProviders = "SPI,CLDR"
String numberFormatProviderClass = "com_opencsv.opencsv.ConverterNumberTest\$NonDecimalNumberFormatProvider"

dependencies {
    testImplementation "com.opencsv:opencsv:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

tasks.withType(Test).configureEach {
    systemProperty "java.locale.providers", localeProviders
}

tasks.named("nativeTest") {
    runtimeArgs.add("-Djava.home=${System.getenv('JAVA_HOME')}")
    runtimeArgs.add("-Djava.locale.providers=$localeProviders")
}

graalvmNative {
    binaries {
        test {
            runtimeArgs("-Djava.home=${System.getenv('JAVA_HOME')}")
            buildArgs.add("-Djava.locale.providers=$localeProviders")
            buildArgs.add("--initialize-at-build-time=$numberFormatProviderClass")
        }
    }

    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
