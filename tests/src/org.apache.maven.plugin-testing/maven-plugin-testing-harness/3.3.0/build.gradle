plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

configurations.configureEach {
    exclude group: 'org.codehaus.plexus', module: 'plexus-container-default'
}

dependencies {
    testImplementation "org.apache.maven.plugin-testing:maven-plugin-testing-harness:$libraryVersion"
    testImplementation 'org.eclipse.sisu:org.eclipse.sisu.plexus:0.3.0.M1'
    testImplementation 'org.apache.maven:maven-core:3.2.5'
    testImplementation 'org.apache.maven:maven-compat:3.2.5'
    testImplementation 'junit:junit:4.11'
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
