plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "org.modelmapper:modelmapper:$libraryVersion"
    testImplementation 'javassist:javassist:3.12.1.GA'
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

tasks.withType(Test).configureEach {
    jvmArgs += [
        "-Dorg.modelmapper.internal.bytebuddy.safe=false",
        "-Dorg.modelmapper.internal.bytebuddy.experimental=true",
        "--add-exports=java.base/jdk.internal.misc=ALL-UNNAMED",
        "--add-exports=java.base/jdk.internal.reflect=ALL-UNNAMED",
        "--add-opens=java.base/java.io=ALL-UNNAMED",
        "--add-opens=java.base/java.lang=ALL-UNNAMED",
        "--add-opens=java.base/jdk.internal.misc=ALL-UNNAMED",
        "--add-opens=jdk.unsupported/sun.misc=ALL-UNNAMED"
    ]
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
    binaries {
        test {
            runtimeArgs("-Dorg.modelmapper.internal.bytebuddy.safe=false")
            runtimeArgs("-Dorg.modelmapper.internal.bytebuddy.experimental=true")
        }
        all {
            buildArgs.addAll([
                '-Dorg.modelmapper.internal.bytebuddy.experimental=true',
                '--add-exports=java.base/jdk.internal.misc=ALL-UNNAMED',
                '--add-exports=java.base/jdk.internal.reflect=ALL-UNNAMED',
                '--add-opens=java.base/java.io=ALL-UNNAMED',
                '--add-opens=java.base/java.lang=ALL-UNNAMED',
                '--add-opens=java.base/jdk.internal.misc=ALL-UNNAMED',
                '--add-opens=jdk.unsupported/sun.misc=ALL-UNNAMED'
            ])
        }
    }
}
