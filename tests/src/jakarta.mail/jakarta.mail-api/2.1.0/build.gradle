plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "jakarta.mail:jakarta.mail-api:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testRuntimeOnly 'org.eclipse.angus:angus-mail:1.0.0'
    testImplementation 'org.glassfish.hk2:osgi-resource-locator:1.0.3'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
