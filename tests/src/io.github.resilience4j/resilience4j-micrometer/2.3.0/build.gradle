plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "io.github.resilience4j:resilience4j-micrometer:$libraryVersion"
    testImplementation "io.github.resilience4j:resilience4j-bulkhead:$libraryVersion"
    testImplementation "io.github.resilience4j:resilience4j-circuitbreaker:$libraryVersion"
    testImplementation "io.github.resilience4j:resilience4j-ratelimiter:$libraryVersion"
    testImplementation "io.github.resilience4j:resilience4j-retry:$libraryVersion"
    testImplementation "io.github.resilience4j:resilience4j-timelimiter:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
