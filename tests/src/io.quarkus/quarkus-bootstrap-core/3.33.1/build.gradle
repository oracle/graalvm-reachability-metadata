plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

configurations {
    augmentorRuntime
}

dependencies {
    testImplementation "io.quarkus:quarkus-bootstrap-core:$libraryVersion"
    augmentorRuntime "io.quarkus:quarkus-core-deployment:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

String augmentorRuntimeClasspath = configurations.augmentorRuntime.asPath
String applicationModelSerializationFormatProperty = "quarkus.bootstrap.application-model.serialization.format"
String applicationModelSerializationFormat = "jos"

tasks.withType(Test).configureEach {
    systemProperty "quarkus.core.deployment.classpath", augmentorRuntimeClasspath
    systemProperty applicationModelSerializationFormatProperty, applicationModelSerializationFormat
}

tasks.named("nativeTest") {
    runtimeArgs.add("-Dquarkus.core.deployment.classpath=${augmentorRuntimeClasspath}")
    runtimeArgs.add("-D${applicationModelSerializationFormatProperty}=${applicationModelSerializationFormat}")
}

graalvmNative {
    binaries {
        test {
            buildArgs.add("-D${applicationModelSerializationFormatProperty}=${applicationModelSerializationFormat}")
        }
    }

    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
