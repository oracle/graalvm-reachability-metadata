plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()
String snappyOsFolder = System.getProperty('os.name').contains('Windows') ? 'Windows'
        : System.getProperty('os.name').contains('Mac') ? 'Mac'
        : System.getProperty('os.name').contains('Linux') ? 'Linux'
        : System.getProperty('os.name').replaceAll(/\W/, '')
String snappyArchFolder = System.getProperty('os.arch').replaceAll(/\W/, '')
String snappyLibraryName = System.mapLibraryName('snappyjava')
Provider<Directory> snappySystemLibraryDir = layout.buildDirectory.dir('snappy-system-lib')

tasks.register('extractSnappySystemLibrary', Copy) {
    from({
        configurations.testRuntimeClasspath.findAll { File file ->
            file.name == "snappy-java-${libraryVersion}.jar"
        }.collect { File file -> zipTree(file) }
    }) {
        String nativeLibraryResource = "org/xerial/snappy/native/${snappyOsFolder}/${snappyArchFolder}" \
                + "/${snappyLibraryName}"
        include nativeLibraryResource
        eachFile { FileCopyDetails details ->
            details.path = snappyLibraryName
        }
        includeEmptyDirs = false
    }
    into snappySystemLibraryDir
}

dependencies {
    testImplementation "org.xerial.snappy:snappy-java:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

String snappySystemLibraryPath = snappySystemLibraryDir.get().asFile.absolutePath

tasks.withType(Test).configureEach {
    dependsOn tasks.named('extractSnappySystemLibrary')
    forkEvery = 1
    jvmArgs '--add-opens=java.base/java.lang=ALL-UNNAMED',
            '--enable-native-access=ALL-UNNAMED',
            "-Djava.library.path=${snappySystemLibraryPath}"
}

tasks.named('nativeTestCompile') {
    dependsOn tasks.named('extractSnappySystemLibrary')
}

tasks.named('nativeTest') {
    dependsOn tasks.named('extractSnappySystemLibrary')
    runtimeArgs.add("-Djava.library.path=${snappySystemLibraryPath}")
    environment.put('LD_LIBRARY_PATH', snappySystemLibraryPath)
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
    binaries {
        all {
            buildArgs.addAll([
                '--add-opens=java.base/java.lang=ALL-UNNAMED',
                '--enable-native-access=ALL-UNNAMED',
                "-Djava.library.path=${snappySystemLibraryPath}"
            ])
        }
    }
}
