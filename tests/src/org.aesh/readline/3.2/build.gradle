plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()
String redirectPipeCreationModeProperty = 'org.jline.terminal.exec.redirectPipeCreationMode'
String redirectPipeCreationModeReflection = 'reflection'

dependencies {
    testImplementation "org.aesh:readline:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

tasks.withType(Test).configureEach {
    systemProperty redirectPipeCreationModeProperty, redirectPipeCreationModeReflection
    jvmArgs "--add-opens=java.base/java.lang=ALL-UNNAMED"
    jvmArgs "--add-opens=java.base/java.io=ALL-UNNAMED"
}

graalvmNative {
    binaries {
        all {
            buildArgs.add('--initialize-at-run-time=org.aesh.terminal.utils.OSUtils')
            buildArgs.add('--add-opens=java.base/java.lang=ALL-UNNAMED')
            buildArgs.add('--add-opens=java.base/java.io=ALL-UNNAMED')
        }
        test {
            runtimeArgs("-D${redirectPipeCreationModeProperty}=${redirectPipeCreationModeReflection}")
        }
    }
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
