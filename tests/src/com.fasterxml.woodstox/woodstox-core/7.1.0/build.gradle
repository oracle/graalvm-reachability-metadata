plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "com.fasterxml.woodstox:woodstox-core:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testRuntimeOnly 'xerces:xercesImpl:2.12.2'
}

graalvmNative {
    agent {
        binaries {
            test {
                buildArgs.add('--add-exports=java.xml/com.sun.org.apache.xerces.internal.impl.xpath.regex=ALL-UNNAMED')
            }
        }

        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}

// Allow Woodstox's legacy JDK50 regexp adapter to access the JDK's internal Xerces regex implementation on Java 21+.
tasks.withType(Test).configureEach {
    jvmArgs '--add-exports', 'java.xml/com.sun.org.apache.xerces.internal.impl.xpath.regex=ALL-UNNAMED'
}
