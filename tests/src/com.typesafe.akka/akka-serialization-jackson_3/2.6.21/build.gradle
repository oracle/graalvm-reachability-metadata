plugins {
    id "org.graalvm.internal.tck"
    id "scala"
}

String libraryVersion = tck.testedLibraryVersion.get()
File generatedTestResourcesDir = layout.buildDirectory.dir("generated/test-resources").get().asFile

sourceSets {
    test {
        resources.srcDir generatedTestResourcesDir
    }
}

tasks.register("generateNativeImageResourceConfig") {
    outputs.dir(generatedTestResourcesDir)
    doLast {
        File baseDir = new File(
                generatedTestResourcesDir,
                "META-INF/native-image/com.typesafe.akka/akka-serialization-jackson_3-tests")
        baseDir.mkdirs()
        new File(baseDir, "resource-config.json").text = """
                {
                  "resources": {
                    "includes": [
                      { "pattern": "application[.]conf" },
                      { "pattern": "akka-actor-reference[.]conf" },
                      { "pattern": "akka-serialization-jackson-reference[.]conf" },
                      { "pattern": "version[.]conf" }
                    ]
                  }
                }
                """.stripIndent()
    }
}

tasks.named("processTestResources") {
    dependsOn("generateNativeImageResourceConfig")
}

tasks.named("generateTestResourcesConfigFile") {
    dependsOn("processTestResources")
}

dependencies {
    testImplementation "com.typesafe.akka:akka-serialization-jackson_3:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testImplementation 'org.scala-lang:scala3-library_3:3.3.6'
    testImplementation 'org.scala-lang:scala3-compiler_3:3.3.6'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
