plugins {
    id "org.graalvm.internal.tck"
    id "scala"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "com.typesafe.akka:akka-serialization-jackson_3:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testImplementation 'org.scala-lang:scala3-library_3:3.3.6'
    testImplementation 'org.scala-lang:scala3-compiler_3:3.3.6'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}

def generatedTestResourcesDir = layout.buildDirectory.dir("generated/test-resources")

tasks.register("extractAkkaReferenceConfigs", Sync) {
    from({
        zipTree(configurations.testRuntimeClasspath.files.find { File file ->
            file.name.startsWith("akka-actor_3-")
        })
    }) {
        include "reference.conf"
        include "version.conf"
        rename { String fileName ->
            fileName == "reference.conf" ? "akka-actor-reference.conf" : fileName
        }
    }
    from({
        zipTree(configurations.testRuntimeClasspath.files.find { File file ->
            file.name.startsWith("akka-serialization-jackson_3-")
        })
    }) {
        include "reference.conf"
        rename { String fileName -> "akka-serialization-jackson-reference.conf" }
    }
    into(generatedTestResourcesDir)
}

sourceSets {
    test {
        resources.srcDir(generatedTestResourcesDir)
    }
}

tasks.named("processTestResources").configure {
    dependsOn("extractAkkaReferenceConfigs")
}
