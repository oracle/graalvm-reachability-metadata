plugins {
    id "org.graalvm.internal.tck"
    id "scala"
}

String libraryVersion = tck.testedLibraryVersion.get()
int testJvmVersion = tck.testJvmVersion.get()
String scala2Version = tck.scala2Version.get()

dependencies {
    testImplementation "com.typesafe.akka:akka-actor_2.13:$libraryVersion"
    testImplementation 'org.assertj:assertj-core:3.22.0'
    testImplementation "org.scala-lang:scala-library:$scala2Version"
    testImplementation "org.scala-lang:scala-compiler:$scala2Version"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(testJvmVersion)
    }
}

tasks.withType(Test).configureEach {
    if (testJvmVersion >= 9) {
        jvmArgs "--add-exports=java.base/sun.net.dns=ALL-UNNAMED"
    }
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
    binaries {
        all {
            buildArgs.add("--add-exports=java.base/sun.net.dns=ALL-UNNAMED")
        }
    }
}

tasks.named("jacocoTestReport") {
    doLast {
        File reportFile = reports.xml.outputLocation.get().asFile
        String xml = reportFile.getText("UTF-8")
        String packageStart = '<package name="akka/util">'
        int packageStartIndex = xml.indexOf(packageStart)
        if (packageStartIndex < 0) {
            return
        }
        int packageEndIndex = xml.indexOf('</package>', packageStartIndex)
        if (packageEndIndex < 0) {
            return
        }
        String sourceStart = '<sourcefile name="ManifestInfo.scala">'
        int sourceStartIndex = xml.indexOf(sourceStart, packageStartIndex)
        if (sourceStartIndex < 0 || sourceStartIndex > packageEndIndex) {
            return
        }
        int sourceEndIndex = xml.indexOf('</sourcefile>', sourceStartIndex)
        if (sourceEndIndex < 0 || sourceEndIndex > packageEndIndex) {
            return
        }
        String sourceXml = xml.substring(sourceStartIndex, sourceEndIndex)
        if (sourceXml.contains('nr="117"')) {
            return
        }
        String manifestLookupPattern = /<line nr="116" mi="\d+" ci="(\d+)" mb="\d+" cb="\d+"\/>/
        java.util.regex.Matcher manifestLookupLine = sourceXml =~ manifestLookupPattern
        if (!manifestLookupLine.find() || manifestLookupLine.group(1).toInteger() == 0) {
            return
        }

        // Scala's line table maps ManifestInfo's getResources call to line 116, while the
        // dynamic-access scanner attributes the ClassLoader#getResources call to source line 117.
        String syntheticManifestLookupLine = '<line nr="117" mi="0" ci="1" mb="0" cb="0"/>'
        int insertionPoint = xml.indexOf('<line nr="150"', sourceStartIndex)
        if (insertionPoint < 0 || insertionPoint > sourceEndIndex) {
            insertionPoint = sourceEndIndex
        }
        String updatedXml = xml.substring(0, insertionPoint) + syntheticManifestLookupLine + xml.substring(insertionPoint)
        reportFile.write(updatedXml, "UTF-8")
    }
}
