plugins {
    id "org.graalvm.internal.tck"
}

String libraryVersion = tck.testedLibraryVersion.get()

dependencies {
    testImplementation "io.lettuce:lettuce-core:$libraryVersion"
    testImplementation 'org.apache.commons:commons-pool2:2.11.1'
    testImplementation 'org.assertj:assertj-core:3.22.0'
}

test {
    systemProperty "io.lettuce.core.epoll", "false"
    systemProperty "io.lettuce.core.iouring", "false"
    systemProperty "io.lettuce.core.kqueue", "false"
}

tasks.named("nativeTest") {
    runtimeArgs.addAll([
            "-Dio.lettuce.core.epoll=false",
            "-Dio.lettuce.core.iouring=false",
            "-Dio.lettuce.core.kqueue=false"
    ])
}

graalvmNative {
    agent {
        defaultMode = "conditional"
        modes {
            conditional {
                userCodeFilterPath = "user-code-filter.json"
            }
        }
    }
}
