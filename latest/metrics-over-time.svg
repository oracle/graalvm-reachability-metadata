<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 860" role="img" aria-labelledby="graph-title graph-desc">
  <title id="graph-title">Coverage over time</title>
  <desc id="graph-desc">A four-panel coverage dashboard showing libraries supported, tested library versions, dynamic access coverage, and tested lines of code over time.</desc>
  <defs>
    <linearGradient id="dashboard-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#fff8ee"/>
    </linearGradient>
    <filter id="panel-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.09"/>
    </filter>
    <linearGradient id="libraries-supported-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="tested-versions-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="dynamic-access-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="tested-lines-of-code-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0.04"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="30" fill="url(#dashboard-bg)"/>
  <text x="28" y="62" fill="#0f172a" font-size="34" font-weight="700">Coverage over time</text>
  <text x="28" y="92" fill="#5f748c" font-size="17">Updated 2026-04-08</text>
  <g>
    <rect x="28" y="120" width="582" height="346" rx="24" fill="#ffffff" fill-opacity="0.90" stroke="#dbe7f3" filter="url(#panel-shadow)"/>
    <text x="52" y="154" fill="#0f172a" font-size="23" font-weight="700">Supported libraries</text>
    <text x="52" y="176" fill="#667b92" font-size="15">Libraries with reachability metadata in the repository</text>
